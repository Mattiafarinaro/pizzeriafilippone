<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Menu Digitale</title>
  
  <!-- SEO & Social Optimization -->
  <meta name="description" content="Menu digitale Pizzeria Filippone Trento. Pizze artigianali, vini e specialità. Ordina via WhatsApp Business." />
  <meta property="og:image" content="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000&auto=format&fit=crop" />

  <!-- Preconnect Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['"Playfair Display"', 'serif'], body: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#C1440E', dark: '#8B2E07' }, ink: { DEFAULT: '#1A120B' }, wa: '#25D366' },
          boxShadow: { 'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.08)', 'action': '0 -4px 20px rgba(0,0,0,0.05)' }
        },
      },
    };
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FBF9F7; color: #1A120B; overflow-x: hidden; }
    body.modal-open { overflow: hidden; }

    /* UI Logic */
    .item-card { display: grid; grid-template-columns: 110px 1fr; gap: 16px; transition: all 0.3s ease; }
    @media (min-width: 480px) { .item-card { grid-template-columns: 150px 1fr; } }
    
    .modal-active { opacity: 1 !important; visibility: visible !important; }
    .modal-panel-active { transform: translateY(0) !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    .chip-active { background-color: #C1440E !important; color: white !important; border-color: #C1440E !important; box-shadow: 0 4px 12px rgba(193, 68, 14, 0.3); }
    .ing-tag { background: #f3f4f6; color: #4b5563; padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid #e5e7eb; display: inline-block; margin: 2px; }
    
    /* Image Failover Style */
    .img-placeholder { background: #eee; display: flex; align-items: center; justify-center: center; color: #ccc; }
    .skeleton { background: linear-gradient(90deg, #ede9e6 25%, #f5f2f0 50%, #ede9e6 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite linear; border-radius: 24px; }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  </style>
</head>

<body class="flex flex-col min-h-screen">

  <!-- HEADER -->
  <header class="bg-white px-6 pt-10 pb-8 text-center border-b border-stone-100">
    <div class="max-w-2xl mx-auto">
      <img src="logo.png" alt="Pizzeria Filippone" class="h-20 w-auto mx-auto mb-4" onerror="this.src='https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200&q=80'">
      <h1 class="font-display text-4xl font-bold tracking-tight">Pizzeria Filippone</h1>
      <p class="text-ink/50 text-sm italic mt-2">"L'arte della pizza, tramandata da generazioni."</p>
      <div class="mt-6 inline-flex items-center gap-2 text-ink/50 text-[10px] font-black bg-stone-50 px-5 py-2.5 rounded-full border border-stone-100 uppercase tracking-widest">
        <svg class="w-3 h-3 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="3" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Via Anna Frank n.7, 38123 Trento
      </div>
    </div>
  </header>

  <!-- SEARCH & NAVIGATION -->
  <div class="bg-white px-5 py-6 max-w-xl mx-auto w-full">
    <div class="mb-6 p-4 bg-brand/5 rounded-2xl border border-brand/10 text-center text-brand-dark font-bold text-[11px]">
      Per ordinazioni via app non sono previste variazioni.<br>Richieste particolari? Usa il tasto <b>"Chiama"</b>.
    </div>
    <div class="relative mb-6">
      <input type="search" id="search-input" oninput="Core.handleSearch()" placeholder="Cerca una pizza, un vino, un amaro..." class="w-full pl-12 pr-4 py-4 rounded-2xl bg-stone-100/60 text-sm outline-none border-none focus:ring-2 focus:ring-brand/20 transition-all">
      <svg class="w-4 h-4 absolute left-5 top-1/2 -translate-y-1/2 text-stone-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <nav id="tab-bar" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></nav>
  </div>

  <!-- FILTERS BAR (STICKY) -->
  <div class="bg-white/80 border-y border-stone-100 px-5 py-3 sticky top-0 z-30 backdrop-blur-md">
    <div class="flex items-center justify-between max-w-xl mx-auto w-full">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button id="chip-veg" onclick="Core.toggleFilter('veg')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">🌿 Veg</button>
            <button id="chip-spicy" onclick="Core.toggleFilter('spicy')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">🌶️ Piccante</button>
            <button id="chip-frozen" onclick="Core.toggleFilter('frozen')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">❄️ Surgelato</button>
        </div>
        <div id="result-count" class="pl-4 text-[10px] font-black uppercase text-stone-400 tracking-widest whitespace-nowrap">0 PRODOTTI</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main id="content" class="flex-1 px-5 pt-8 pb-48 space-y-6 max-w-xl mx-auto w-full"></main>

  <!-- ACTION BAR -->
  <div class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-xl border-t border-stone-100 px-4 pt-4 pb-8 shadow-action">
    <div class="flex gap-2 max-w-xl mx-auto">
      <a href="tel:+390461924565" class="flex-1 bg-stone-900 text-white rounded-2xl h-14 font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>Chiama
      </a>
      <a href="https://wa.me/390461924565" target="_blank" class="flex-1 bg-wa text-white rounded-2xl h-14 font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>WhatsApp
      </a>
      <button onclick="Core.openCart()" class="flex-1 bg-brand text-white rounded-2xl h-14 font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all shadow-glass">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        Carrello (<span id="cart-qty-footer">0</span>)
      </button>
    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-backdrop" class="fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="Core.closeModal()">
    <div id="modal-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-500 overflow-y-auto max-h-[94vh] relative" onclick="event.stopPropagation()">
      <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
      <button onclick="Core.closeModal()" class="absolute top-6 right-6 bg-white shadow-lg p-3 rounded-full z-10 text-stone-900 border border-stone-100">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="cart-backdrop" class="fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="Core.closeCart()">
    <div id="cart-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-500 overflow-y-auto max-h-[92vh]" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-10 px-2">
        <h2 class="font-display text-3xl font-bold text-ink tracking-tight">Il tuo ordine</h2>
        <button onclick="Core.clearCart()" class="text-[10px] font-black text-brand bg-brand/5 px-4 py-2 rounded-xl uppercase tracking-widest border border-brand/10">Svuota</button>
      </div>
      <div id="cart-items" class="space-y-4 mb-10"></div>
      <div id="cart-summary"></div>
    </div>
  </div>

  <button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-32 right-6 z-40 bg-stone-900 text-white p-4 rounded-full shadow-2xl transition-all scale-0">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"/></svg>
  </button>

  <script>
    /**
     * Senior Module Architecture
     */
    const Core = (() => {
      const CONFIG = {
        CSV: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',
        WA: '390461924565',
        STORE: 'filippone_v15_stable'
      };

      const ASSETS = {
        pizza: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=600&q=80',
        vino: 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=600&q=80',
        birra: 'https://images.unsplash.com/photo-1535958636474-b021ee887b13?auto=format&fit=crop&w=600&q=80',
        drink: 'https://images.unsplash.com/photo-1536935338218-841273f2a64c?auto=format&fit=crop&w=600&q=80',
        caff: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=600&q=80',
        dolce: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=600&q=80',
        amaro: 'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600&q=80'
      };

      const EMOJIS = {
        'tutti': '🍽️', 'pizza': '🍕', 'birra': '🍺', 'vino': '🍷', 'aperitivo': '🍹', 'dolci': '🍰', 'amaro': '🥃', 'caff': '☕', 'antipast': '🫒'
      };

      let state = { items: [], categories: [], activeCat: 'Tutti', cart: [], search: '', filters: { veg: false, spicy: false, frozen: false } };

      const getSafeImg = (i) => {
        if (i.immagine && i.immagine.length > 10 && i.immagine.startsWith('http')) return i.immagine;
        const n = (i.nome || "").toLowerCase(), c = (i.categoria || "").toLowerCase();
        if (n.includes('vino') || c.includes('vino')) return ASSETS.vino;
        if (n.includes('birra') || c.includes('birra')) return ASSETS.birra;
        if (n.includes('caff') || c.includes('caff')) return ASSETS.caff;
        if (n.includes('aperitivo') || n.includes('spritz')) return ASSETS.drink;
        if (c.includes('dolci')) return ASSETS.dolce;
        if (c.includes('amaro') || c.includes('liquor')) return ASSETS.amaro;
        return ASSETS.pizza;
      };

      const parseCSV = (t) => {
        const rows = t.replace(/^\uFEFF/, "").split(/\r?\n/).filter(r => r.trim());
        const head = rows[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
        const f = (ks) => head.findIndex(h => ks.some(k => h.includes(k)));
        const col = { id: f(['id']), nome: f(['nome']), cat: f(['categoria']), ing: f(['ingred']), all: f(['allerg']), pre: f(['prezzo', '€']), img: f(['immag']), var: f(['variant']), veg: f(['isveg']), spi: f(['isspicy']), fro: f(['isfrozen']) };

        return rows.slice(1).map(r => {
          const v = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const g = (idx) => v[idx]?.replace(/^"|"$/g, '').trim() || "";
          return {
            id: g(col.id) || Math.random().toString(36).substr(2, 9),
            nome: g(col.nome), categoria: g(col.cat) || "Altro", ingredienti: g(col.ing),
            allergeni: g(col.all), varianti: g(col.var),
            prezzo: parseFloat(g(col.pre).replace('€', '').replace(',', '.')) || 0,
            immagine: g(col.img), isVeg: g(col.veg).toUpperCase() === 'SI',
            isSpicy: g(col.spi).toUpperCase() === 'SI', isFrozen: g(col.fro).toUpperCase() === 'SI'
          };
        }).filter(i => i.nome.length > 1);
      };

      const renderCards = () => {
        const c = document.getElementById('content');
        if (!c) return;
        let data = state.items.filter(i => state.activeCat === 'Tutti' || i.categoria === state.activeCat);
        if (state.search) data = data.filter(i => i.nome.toLowerCase().includes(state.search) || i.ingredienti.toLowerCase().includes(state.search));
        if (state.filters.veg) data = data.filter(i => i.isVeg);
        if (state.filters.spicy) data = data.filter(i => i.isSpicy);
        if (state.filters.frozen) data = data.filter(i => i.isFrozen);

        document.getElementById('result-count').textContent = `${data.length} PRODOTTI`;
        c.innerHTML = data.map(item => `
          <div class="item-card bg-white rounded-[32px] p-4 border border-stone-100 shadow-sm active:scale-[0.98]" onclick="Core.openDetail('${item.id}')">
            <div class="aspect-square rounded-[24px] overflow-hidden bg-stone-100 relative">
              <img src="${getSafeImg(item)}" class="w-full h-full object-cover" loading="lazy">
              <div class="absolute top-2 right-2 flex flex-col gap-1">
                ${item.isVeg ? '<span class="bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] shadow-sm">🌿</span>' : ''}
                ${item.isSpicy ? '<span class="bg-white/90 backdrop-blur px-2 py-1 rounded-lg text-[10px] shadow-sm">🌶️</span>' : ''}
              </div>
            </div>
            <div class="flex flex-col justify-center pr-2 overflow-hidden">
              <div class="flex justify-between items-start mb-1 gap-2">
                <h3 class="font-extrabold text-ink text-[17px] leading-tight truncate">${item.nome}</h3>
                <span class="font-black text-brand shrink-0 text-base">€${item.prezzo.toFixed(2)}</span>
              </div>
              <p class="text-stone-400 text-xs leading-relaxed line-clamp-2">${item.ingredienti}</p>
            </div>
          </div>`).join('');
      };

      return {
        init: async () => {
          const proxies = [u => `https://corsproxy.io/?${encodeURIComponent(u)}`, u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` ];
          let raw = "";
          for (let p of proxies) { try { const res = await fetch(p(CONFIG.CSV)); if (res.ok) { raw = await res.text(); break; } } catch (e) {} }
          if (raw) {
            state.items = parseCSV(raw);
            state.categories = ['Tutti', ...new Set(state.items.map(i => i.categoria))];
            const bar = document.getElementById('tab-bar');
            bar.innerHTML = state.categories.map(cat => {
              let em = '🍕'; for (const [k, e] of Object.entries(EMOJIS)) { if (cat.toLowerCase().includes(k)) em = e; }
              return `<button onclick="Core.setCat('${cat}')" class="shrink-0 flex items-center gap-2 px-6 py-3.5 rounded-2xl text-[13px] font-extrabold border transition-all ${cat === state.activeCat ? 'bg-stone-900 text-white border-stone-900 shadow-xl' : 'bg-white text-stone-400 border-stone-100'}"><span>${em}</span> ${cat}</button>`;
            }).join('');
            renderCards();
          }
          const s = localStorage.getItem(CONFIG.STORE); if (s) { state.cart = JSON.parse(s); Core.syncCart(); }
        },
        setCat: (c) => { state.activeCat = c; Core.init(); }, // Re-render simple
        toggleFilter: (f) => { state.filters[f] = !state.filters[f]; document.getElementById(`chip-${f}`).classList.toggle('chip-active'); renderCards(); },
        handleSearch: () => { state.search = document.getElementById('search-input').value.toLowerCase(); renderCards(); },
        openDetail: (id) => {
          const it = state.items.find(i => i.id === id); if (!it) return;
          const tags = it.ingredienti.split(',').filter(t => t.trim()).map(t => `<span class="ing-tag">${t.trim()}</span>`).join('');
          document.body.classList.add('modal-open');
          document.getElementById('modal-content').innerHTML = `
            <div class="aspect-video w-full rounded-[32px] overflow-hidden mb-6 bg-stone-100"><img src="${getSafeImg(it)}" class="w-full h-full object-cover"></div>
            <div class="flex justify-between items-start mb-6 px-2">
              <div class="min-w-0 pr-4"><h2 class="text-3xl font-display font-extrabold text-ink truncate">${it.nome}</h2><p class="text-brand font-black text-[11px] uppercase mt-2 tracking-widest">${it.categoria}</p></div>
              <span class="text-2xl font-black text-brand bg-brand/5 px-5 py-2.5 rounded-2xl">€${it.prezzo.toFixed(2)}</span>
            </div>
            <div class="mb-8 px-2"><p class="text-[10px] font-black text-stone-300 uppercase mb-4 tracking-widest">Ingredienti</p><div class="flex flex-wrap">${tags || 'Vedi descrizione'}</div></div>
            ${it.allergeni ? `<div class="mx-2 p-5 bg-amber-50/50 rounded-[28px] border border-amber-100 mb-8"><p class="text-[10px] text-amber-700 font-bold uppercase mb-2">⚠️ Allergeni</p><p class="text-xs text-amber-800 font-bold leading-relaxed">${it.allergeni}</p></div>` : ''}
            <button onclick="Core.addCart('${it.id}')" class="w-full bg-brand text-white rounded-[24px] py-6 font-extrabold text-lg shadow-action active:scale-95 transition-all">Aggiungi all'ordine</button>`;
          document.getElementById('modal-backdrop').classList.add('modal-active');
          setTimeout(() => document.getElementById('modal-panel').classList.add('modal-panel-active'), 10);
        },
        addCart: (id) => { const it = state.items.find(i => i.id === id); state.cart.push({ ...it, cartId: Date.now() }); Core.syncCart(); Core.closeModal(); },
        syncCart: () => {
          localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state.cart));
          const f = document.getElementById('cart-qty-footer'); if (f) f.textContent = state.cart.length;
          if (document.getElementById('cart-backdrop').classList.contains('modal-active')) Core.renderCartUI();
        },
        renderCartUI: () => {
          const c = document.getElementById('cart-items'); if (!c) return;
          if (state.cart.length === 0) { c.innerHTML = `<div class="text-center py-20 text-stone-300 font-bold text-xs uppercase">Carrello Vuoto</div>`; document.getElementById('cart-summary').innerHTML = ""; return; }
          const g = state.cart.reduce((a, i) => { if(!a[i.nome]) a[i.nome] = { ...i, qty: 0, ids: [] }; a[i.nome].qty++; a[i.nome].ids.push(i.cartId); return a; }, {});
          c.innerHTML = Object.values(g).map(item => `
            <div class="bg-stone-50 p-6 rounded-[32px] flex justify-between items-center border border-stone-100">
              <div class="min-w-0 pr-4"><p class="font-extrabold text-ink truncate">${item.nome}</p><p class="text-brand font-black text-sm">€${(item.prezzo * item.qty).toFixed(2)}</p></div>
              <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-xl shadow-sm border border-stone-100 shrink-0">
                <button onclick="Core.changeQty(${item.ids[0]}, -1)" class="text-brand font-black p-1 text-lg">-</button>
                <span class="font-black text-ink text-sm w-4 text-center">${item.qty}</span>
                <button onclick="Core.changeQty(${item.ids[0]}, 1)" class="text-brand font-black p-1 text-lg">+</button>
              </div>
            </div>`).join('');
          const t = state.cart.reduce((a, i) => a + i.prezzo, 0);
          document.getElementById('cart-summary').innerHTML = `<button onclick="Core.sendWA()" class="w-full bg-wa text-white py-6 rounded-[24px] font-black text-lg shadow-xl">Ordina via WhatsApp (Tot: €${t.toFixed(2)})</button>`;
        },
        changeQty: (id, d) => { if (d > 0) { const it = state.cart.find(i => i.cartId === id); state.cart.push({...it, cartId: Date.now()}); } else { const idx = state.cart.findIndex(i => i.cartId === id); if(idx !== -1) state.cart.splice(idx, 1); } Core.syncCart(); },
        clearCart: () => { state.cart = []; Core.syncCart(); Core.closeCart(); },
        openCart: () => { Core.renderCartUI(); document.body.classList.add('modal-open'); document.getElementById('cart-backdrop').classList.add('modal-active'); setTimeout(() => document.getElementById('cart-panel').classList.add('modal-panel-active'), 10); },
        closeModal: () => { document.body.classList.remove('modal-open'); document.getElementById('modal-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('modal-backdrop').classList.remove('modal-active'), 300); },
        closeCart: () => { document.body.classList.remove('modal-open'); document.getElementById('cart-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('cart-backdrop').classList.remove('modal-active'), 300); },
        sendWA: () => {
          if(state.cart.length === 0) return;
          const g = state.cart.reduce((a, i) => { a[i.nome] = (a[i.nome] || 0) + 1; return a; }, {});
          const t = state.cart.reduce((a, i) => a + i.prezzo, 0);
          let m = "🍕 *NUOVO ORDINE - PIZZERIA FILIPPONE*\n\n";
          Object.entries(g).forEach(([n, q]) => { m += `• ${q}x *${n}*\n`; });
          m += `\n💰 *TOTALE: €${t.toFixed(2)}*`;
          window.open(`https://wa.me/${CONFIG.WA}?text=${encodeURIComponent(m)}`, '_blank');
        }
      };
    })();

    document.addEventListener('DOMContentLoaded', () => { 
      Core.init();
      window.addEventListener('scroll', () => {
        const btn = document.getElementById('back-to-top');
        if (btn) {
          if (window.scrollY > 600) { btn.style.transform = 'scale(1)'; btn.style.opacity = '1'; }
          else { btn.style.transform = 'scale(0)'; btn.style.opacity = '0'; }
        }
      });
    });

    function renderSkeletons() { document.getElementById('content').innerHTML = Array(4).fill('<div class="skeleton mb-4"></div>').join(''); }
  </script>
</body>
</html>
