<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Menu Digitale</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#C1440E', cream: '#FAF6EF', ink: '#1A120B' },
          fontFamily: { display: ['Playfair Display', 'serif'], body: ['DM Sans', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    .skeleton { background: linear-gradient(90deg, #e8ddd0 25%, #f5ede0 50%, #e8ddd0 75%); background-size: 400px 100%; animation: shimmer 1.4s infinite linear; }
    @keyframes shimmer { 0% { backgroundPosition: -400px 0; } 100% { backgroundPosition: 400px 0; } }
    .menu-card { opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
    .menu-card.visible { opacity: 1; transform: translateY(0); }
    .chip.active { background: #C1440E; color: white; }
  </style>
</head>

<body class="bg-cream text-ink font-body flex flex-col h-screen overflow-hidden">

  <header class="bg-brand text-white p-6 shrink-0 shadow-lg">
    <h1 class="text-3xl font-display font-bold">Pizzeria Filippone</h1>
    <p class="opacity-80 text-sm">Qualità e tradizione dal 1966</p>
  </header>

  <nav id="tab-bar" class="flex gap-2 overflow-x-auto p-4 bg-white border-b shrink-0 no-scrollbar"></nav>

  <div class="flex gap-2 px-4 py-2 bg-cream border-b shrink-0">
    <button id="btn-veg" onclick="toggleFilter('veg')" class="chip border border-green-600 text-green-700 px-3 py-1 rounded-full text-xs font-bold">🌿 Veg</button>
    <button id="btn-spicy" onclick="toggleFilter('spicy')" class="chip border border-red-600 text-red-700 px-3 py-1 rounded-full text-xs font-bold">🌶️ Piccante</button>
  </div>

  <main id="content" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
    </main>

  <div class="fixed bottom-0 w-full bg-white/90 backdrop-blur p-4 border-t flex gap-4">
    <a href="tel:+390461924565" class="flex-1 bg-ink text-white text-center py-3 rounded-xl font-bold">Chiama</a>
    <button onclick="window.open('https://wa.me/390461924565')" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold">WhatsApp</button>
  </div>

  <script>
    const CONFIG = {
      // URL del tuo CSV (Assicurati che sia PUBBLICATO SUL WEB come CSV)
      CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv'
    };

    let allItems = [];
    let currentCategory = 'Tutti';
    let filters = { veg: false, spicy: false };

    // 1. Caricamento Dati
    async function loadData() {
      const container = document.getElementById('content');
      container.innerHTML = '<p class="text-center py-10 opacity-50">Caricamento menu...</p>';

      try {
        // Usiamo un proxy per evitare errori CORS su GitHub Pages
        const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(CONFIG.CSV_URL)}`);
        if (!response.ok) throw new Error("Errore nel recupero dati");
        
        const csvText = await response.text();
        allItems = parseCSV(csvText);
        
        renderTabs();
        renderCards();
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="text-center py-10 text-red-600">
          <p>Errore nel caricamento del foglio Google.</p>
          <p class="text-xs opacity-50">${err.message}</p>
        </div>`;
      }
    }

    // 2. Parser CSV Robusto
    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["']/g, ""));
      
      return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.trim().replace(/["']/g, ""));
        const item = {};
        headers.forEach((header, i) => {
            // Mappatura flessibile delle colonne
            if (header.includes('nome')) item.nome = values[i];
            if (header.includes('categoria')) item.categoria = values[i];
            if (header.includes('prezzo')) item.prezzo = values[i].replace(',', '.');
            if (header.includes('ingredienti')) item.ingredienti = values[i];
            if (header.includes('isveg')) item.isVeg = values[i].toLowerCase() === 'si';
            if (header.includes('isspicy')) item.isSpicy = values[i].toLowerCase() === 'si';
            if (header.includes('disponibile')) item.disponibile = values[i].toLowerCase() !== 'no';
            if (header.includes('immagine')) item.immagine = values[i];
        });
        return item;
      }).filter(item => item.nome && item.disponibile);
    }

    // 3. Rendering
    function renderTabs() {
      const categories = ['Tutti', ...new Set(allItems.map(i => i.categoria))];
      const bar = document.getElementById('tab-bar');
      bar.innerHTML = categories.map(cat => `
        <button onclick="setCategory('${cat}')" class="px-4 py-2 rounded-full whitespace-nowrap text-sm font-bold border ${currentCategory === cat ? 'bg-brand text-white' : 'bg-white'}">
          ${cat}
        </button>
      `).join('');
    }

    function renderCards() {
      const container = document.getElementById('content');
      let filtered = allItems.filter(i => {
        const catMatch = currentCategory === 'Tutti' || i.categoria === currentCategory;
        const vegMatch = !filters.veg || i.isVeg;
        const spicyMatch = !filters.spicy || i.isSpicy;
        return catMatch && vegMatch && spicyMatch;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<p class="text-center py-10 opacity-50">Nessun piatto trovato.</p>';
        return;
      }

      container.innerHTML = filtered.map((item, idx) => `
        <div class="menu-card bg-white p-4 rounded-2xl shadow-sm flex gap-4 border border-gray-100" style="animation-delay: ${idx * 0.05}s">
          ${item.immagine ? `<img src="${item.immagine}" class="w-20 h-20 object-cover rounded-lg">` : `<div class="w-20 h-20 bg-gray-100 rounded-lg flex items-center justify-center text-2xl">🍕</div>`}
          <div class="flex-1">
            <div class="flex justify-between items-start">
              <h3 class="font-bold text-lg">${item.nome}</h3>
              <span class="text-brand font-bold">€${parseFloat(item.prezzo).toFixed(2)}</span>
            </div>
            <p class="text-sm text-gray-500 line-clamp-2">${item.ingredienti || ''}</p>
            <div class="mt-2 flex gap-1">
              ${item.isVeg ? '<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">VEG</span>' : ''}
              ${item.isSpicy ? '<span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold">PICCANTE</span>' : ''}
            </div>
          </div>
        </div>
      `).join('');

      // Trigger animazione
      setTimeout(() => {
        document.querySelectorAll('.menu-card').forEach(el => el.classList.add('visible'));
      }, 100);
    }

    function setCategory(cat) {
      currentCategory = cat;
      renderTabs();
      renderCards();
    }

    function toggleFilter(f) {
      filters[f] = !filters[f];
      document.getElementById(`btn-${f}`).classList.toggle('active');
      renderCards();
    }

    // Start
    loadData();
  </script>
</body>
</html>
