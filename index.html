  <!-- ═══ Tailwind CSS v3 CDN ═══ -->

  <script>

      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body:    ['"Plus Jakarta Sans"', 'sans-serif'],
          },

  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #FBF9F7;
      color: #1A120B;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    /* Prevent scroll when modal is open */
    body.modal-open { overflow: hidden; }

    /* ── Scrollbar ── */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { scrollbar-width: none; }

    /* ── Skeleton shimmer ── */
    .skeleton {
      background: linear-gradient(90deg, #ede9e6 25%, #f5f2f0 50%, #ede9e6 75%);
      background-size: 400px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 24px;
      height: 115px;
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    /* ── Item card grid: image left, text right ── */
    .item-card {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .item-card:active { transform: scale(.985); }
    @media (min-width: 480px) { .item-card { grid-template-columns: 140px 1fr; } }

    /* ── Chip filter active state ── */
    .chip-active {
      background-color: #C1440E !important;
      color: white !important;
      border-color: #C1440E !important;
    }

    /* ── Tab active state ── */
    .tab-active {
      background: #1A120B !important;
      color: white !important;
      border-color: #1A120B !important;
    }

    /* ── Ingredient tag pill ── */
    .ing-tag {
      display: inline-block;
      background: #f3f4f6;
      color: #4b5563;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid #e5e7eb;
      margin: 2px;
    }

    /* ── Modal: CSS-transition approach (no class-toggle flash) ── */
    .modal-wrap {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(26,18,11,.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity .3s ease, visibility .3s ease;
    }
    .modal-wrap.open { opacity: 1; visibility: visible; }
    .modal-panel {
      background: white;
      width: 100%; max-width: 36rem;
      border-radius: 40px 40px 0 0;
      padding: 2rem 2rem 3rem;
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform .4s cubic-bezier(.32,0,.15,1);
    }
    .modal-wrap.open .modal-panel { transform: translateY(0); }

    /* ── Back to top button ── */
    #back-to-top {
      opacity: 0; pointer-events: none;
      transform: scale(.8);
      transition: opacity .3s, transform .3s;
    }
    #back-to-top.show { opacity: 1; pointer-events: auto; transform: scale(1); }

    /* ── Action bar safe area ── */
    #action-bar { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }

    /* ── Stagger card animation ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim { animation: cardIn .3s ease forwards; }
  </style>
</head>

  <!-- ═══════════════════════════════════
       JAVASCRIPT — IIFE Module Pattern
       Everything is scoped. Zero globals
       except the exported `App` object.
  ═══════════════════════════════════ -->
  <script>
  const App = (() => {
    'use strict';

    // ─────────────────────────────────────────────
    // CONFIG — single source of truth
    // ─────────────────────────────────────────────
    const CONFIG = {
      CSV:      'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',
      WA:       '390461924565',
      PHONE:    '+390461924565',
      STORAGE:  'filippone_cart_v1',
      WA_INTRO: '🍕 *ORDINE - Pizzeria Filippone*\n\n',
    };

    // Unsplash placeholder images per macro-categoria
    const ASSETS = {
      pizza:     'https://images.unsplash.com/photo-1574071318508-1cdbad80ad38?auto=format&fit=crop&w=600&q=80',
      vino:      'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=600&q=80',
      birra:     'https://images.unsplash.com/photo-1535958636474-b021ee887b13?auto=format&fit=crop&w=600&q=80',
      aperitivo: 'https://images.unsplash.com/photo-1536935338218-841273f2a64c?auto=format&fit=crop&w=600&q=80',
      caffe:     'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=600&q=80',
      dolce:     'https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=600&q=80',
      amaro:     'https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=600&q=80',
      acqua:     'https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=600&q=80',
      insalata:  'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=600&q=80',
      focaccia:  'https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=600&q=80',
    };

    // Emoji per tab bar — keyword matching
    const TAB_EMOJI = {
      pizza: '🍕', classica: '🍕', bianca: '🧀', speciale: '⭐', casa: '🏠',
      antipast: '🫒', insalata: '🥗', focaccia: '🥖',
      bibita: '🥤', birra: '🍺', vino: '🍷',
      aperitivo: '🍹', amaro: '🥃', caff: '☕', dolc: '🍮',
    };

    // Categories that show pizza variants in modal
    const VARIANT_CATEGORIES = new Set([
      'Pizza Classica', 'Pizza Bianca', 'Pizza Speciale', 'Pizza della Casa', 'Focaccia',
    ]);

    // ─────────────────────────────────────────────
    // STATE — single mutable object, never scattered
    // ─────────────────────────────────────────────
    const state = {
      items:      [],       // all parsed menu items
      categories: [],       // ordered unique categories
      activeCat:  'Tutti',
      search:     '',
      filters:    { veg: false, spicy: false, frozen: false },
      cart:       [],       // [{...item, cartId: timestamp}]
    };

    // ─────────────────────────────────────────────
    // CSV PARSER
    // Uses regex-based field split to correctly handle
    // commas inside quoted fields (e.g. "Latte, Glutine")
    // Column matching by keyword → resilient to renames
    // ─────────────────────────────────────────────
    const parseCSV = (raw) => {
      // Strip BOM, normalize line endings
      const lines = raw.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').filter(l => l.trim());
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());

      // Column index finder — checks all provided keywords
      const col = (keys) => headers.findIndex(h => keys.some(k => h.includes(k)));
      const COLS = {
        id:    col(['id']),
        nome:  col(['nome']),
        cat:   col(['categoria']),
        ing:   col(['ingred']),
        all:   col(['allerg']),
        pre:   col(['prezzo', '€']),
        img:   col(['immag', 'url']),
        veg:   col(['isveg', 'is_veg', 'veg']),
        spicy: col(['isspicy', 'is_spicy', 'spicy', 'piccante']),
        froz:  col(['isfrozen', 'is_frozen', 'frozen', 'surgelato']),
        vari:  col(['variant']),
      };

      // Regex-based CSV field split — handles quoted commas correctly
      const splitLine = (line) => {
        const result = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQ = !inQ; }
          else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
          else { cur += line[i]; }
        }
        result.push(cur);
        return result;
      };

      const get = (fields, idx) => {
        if (idx < 0 || idx >= fields.length) return '';
        return fields[idx].replace(/^"|"$/g, '').trim();
      };

      return lines.slice(1).map((line, i) => {
        const f = splitLine(line);
        const rawPrice = get(f, COLS.pre).replace(/[€\s]/g, '').replace(',', '.');
        return {
          id:          get(f, COLS.id) || String(i + 1),
          nome:        get(f, COLS.nome),
          categoria:   get(f, COLS.cat) || 'Altro',
          ingredienti: get(f, COLS.ing),
          allergeni:   get(f, COLS.all),
          varianti:    get(f, COLS.vari),
          prezzo:      parseFloat(rawPrice) || 0,
          immagine:    get(f, COLS.img),
          isVeg:       get(f, COLS.veg).toUpperCase()   === 'SI',
          isSpicy:     get(f, COLS.spicy).toUpperCase() === 'SI',
          isFrozen:    get(f, COLS.froz).toUpperCase()  === 'SI',
        };
      }).filter(item => item.nome.length > 0);
    };

    // ─────────────────────────────────────────────
    // DATA FETCH — 4-proxy cascade with abort timeout
    // Proxies tried in order; first success wins.
    // Falls back to direct fetch as last resort.
    // ─────────────────────────────────────────────
    const fetchCSV = async (csvUrl) => {
      const PROXIES = [
        u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://thingproxy.freeboard.io/fetch/${u}`,
        u => u, // direct (works if sheet is truly public + no strict CORS)
      ];
      const LABELS = ['corsproxy.io', 'allorigins.win', 'thingproxy', 'diretto'];

      for (let i = 0; i < PROXIES.length; i++) {
        const url = PROXIES[i](csvUrl);
        _setStatus(`Caricamento... (tentativo ${i + 1}/${PROXIES.length} via ${LABELS[i]})`);
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 8000); // 8s timeout per proxy
          const res = await fetch(url, { signal: controller.signal, cache: 'no-store' });
          clearTimeout(timeout);
          if (!res.ok) continue;
          const text = await res.text();
          if (!text || text.trim().length < 20) continue;
          const parsed = parseCSV(text);
          if (parsed.length === 0) continue;
          _setStatus('');
          return parsed; // success
        } catch (e) {
          // AbortError or network error — try next proxy
          continue;
        }
      }
      return null; // all proxies failed
    };

    // ─────────────────────────────────────────────
    // IMAGE RESOLVER
    // Priority: sheet URL → name/category heuristic → generic pizza
    // ─────────────────────────────────────────────
    const resolveImg = (item) => {
      if (item.immagine && item.immagine.startsWith('http')) return item.immagine;
      const n = item.nome.toLowerCase();
      const c = item.categoria.toLowerCase();
      if (n.includes('acqua'))                                    return ASSETS.acqua;
      if (n.includes('vino') || c.includes('vino'))               return ASSETS.vino;
      if (n.includes('birra') || c.includes('birra'))             return ASSETS.birra;
      if (n.includes('spritz') || n.includes('hugo') || c.includes('aperitiv')) return ASSETS.aperitivo;
      if (n.includes('caff') || c.includes('caff'))               return ASSETS.caffe;
      if (c.includes('amaro') || c.includes('liquor'))            return ASSETS.amaro;
      if (c.includes('dolc'))                                     return ASSETS.dolce;
      if (c.includes('insalata'))                                 return ASSETS.insalata;
      if (c.includes('focaccia'))                                 return ASSETS.focaccia;
      return ASSETS.pizza;
    };

    // ─────────────────────────────────────────────
    // TAB BAR RENDER
    // ─────────────────────────────────────────────
    const _renderTabs = () => {
      const bar = document.getElementById('tab-bar');
      if (!bar) return;
      bar.innerHTML = state.categories.map(cat => {
        const low = cat.toLowerCase();
        let em = '🍽️';
        for (const [k, e] of Object.entries(TAB_EMOJI)) { if (low.includes(k)) { em = e; break; } }
        const active = cat === state.activeCat;
        return `<button
          onclick="App.setCat('${cat}')"
          class="shrink-0 flex items-center gap-2 px-5 py-3 rounded-2xl text-[13px] font-extrabold border transition-all ${active ? 'tab-active shadow-lg' : 'bg-white text-stone-400 border-stone-100'}">
          <span>${em}</span> ${cat}
        </button>`;
      }).join('');
    };

    // ─────────────────────────────────────────────
    // CARD LIST RENDER
    // Filters applied in order: category → search → chips
    // ─────────────────────────────────────────────
    const _renderCards = () => {
      const el = document.getElementById('content');
      if (!el) return;

      let data = state.activeCat === 'Tutti'
        ? state.items
        : state.items.filter(i => i.categoria === state.activeCat);

      if (state.search) {
        const q = state.search;
        data = data.filter(i =>
          i.nome.toLowerCase().includes(q) ||
          i.ingredienti.toLowerCase().includes(q)
        );
      }
      if (state.filters.veg)    data = data.filter(i => i.isVeg);
      if (state.filters.spicy)  data = data.filter(i => i.isSpicy);
      if (state.filters.frozen) data = data.filter(i => i.isFrozen);

      const countEl = document.getElementById('result-count');
      if (countEl) countEl.textContent = `${data.length} prodotti`;

      if (data.length === 0) {
        el.innerHTML = `
          <div class="text-center py-20 text-stone-400">
            <p class="text-5xl mb-3">🔍</p>
            <p class="font-bold">Nessun risultato</p>
            <p class="text-sm mt-1 text-stone-300">Prova un altro filtro o categoria</p>
          </div>`;
        return;
      }

      el.innerHTML = data.map((item, idx) => `
        <div class="item-card card-anim bg-white rounded-[28px] p-4 border border-stone-100 shadow-sm cursor-pointer"
             style="animation-delay:${Math.min(idx * 35, 400)}ms"
             onclick="App.openDetail('${item.id}')">
          <div class="aspect-square rounded-[20px] overflow-hidden bg-stone-100 relative">
            <img src="${resolveImg(item)}" alt="${item.nome}"
                 class="w-full h-full object-cover" loading="lazy"
                 onerror="this.src='${ASSETS.pizza}';this.onerror=null" />
            <div class="absolute top-2 right-2 flex flex-col gap-1">
              ${item.isVeg    ? '<span class="bg-white/90 backdrop-blur px-1.5 py-0.5 rounded-lg text-[10px] shadow-sm">🌿</span>' : ''}
              ${item.isSpicy  ? '<span class="bg-white/90 backdrop-blur px-1.5 py-0.5 rounded-lg text-[10px] shadow-sm">🌶️</span>' : ''}
              ${item.isFrozen ? '<span class="bg-white/90 backdrop-blur px-1.5 py-0.5 rounded-lg text-[10px] shadow-sm">❄️</span>' : ''}
            </div>
          </div>
          <div class="flex flex-col justify-center min-w-0 pr-1">
            <div class="flex justify-between items-start gap-2 mb-1">
              <h3 class="font-extrabold text-ink text-[16px] leading-tight">${item.nome}</h3>
              <span class="font-black text-brand shrink-0 text-base">€${item.prezzo.toFixed(2)}</span>
            </div>
            <p class="text-stone-400 text-xs leading-relaxed line-clamp-2">${item.ingredienti}</p>
            <p class="text-stone-300 text-[10px] font-bold uppercase tracking-wider mt-2">${item.categoria}</p>
          </div>
        </div>`).join('');
    };

    // ─────────────────────────────────────────────
    // SKELETON LOADER
    // ─────────────────────────────────────────────
    const _renderSkeletons = () => {
      const el = document.getElementById('content');
      if (el) el.innerHTML = Array(5).fill('<div class="skeleton mb-3"></div>').join('');
    };

    // ─────────────────────────────────────────────
    // STATUS TEXT (shown during fetch)
    // ─────────────────────────────────────────────
    const _setStatus = (msg) => {
      let el = document.getElementById('fetch-status');
      if (!el) {
        el = document.createElement('p');
        el.id = 'fetch-status';
        el.style.cssText = 'text-align:center;font-size:10px;color:#aaa;padding:4px 16px;font-family:monospace';
        document.getElementById('content')?.prepend(el);
      }
      el.textContent = msg;
    };

    // ─────────────────────────────────────────────
    // CART — localStorage persistence
    // Cart items are stored as copies (spread) so
    // mutations to state.items don't affect the cart.
    // Each addition gets a unique cartId (Date.now())
    // for precise single-item removal.
    // ─────────────────────────────────────────────
    const _saveCart = () => {
      try { localStorage.setItem(CONFIG.STORAGE, JSON.stringify(state.cart)); } catch (_) {}
    };

    const _loadCart = () => {
      try {
        const saved = localStorage.getItem(CONFIG.STORAGE);
        if (saved) state.cart = JSON.parse(saved);
      } catch (_) { state.cart = []; }
    };

    const _updateBadge = () => {
      const el = document.getElementById('cart-badge');
      if (el) el.textContent = state.cart.length;
    };

    // Group cart items by name for display (qty aggregation)
    const _groupCart = () => {
      const map = new Map();
      for (const item of state.cart) {
        if (!map.has(item.nome)) {
          map.set(item.nome, { ...item, qty: 0, cartIds: [] });
        }
        const g = map.get(item.nome);
        g.qty++;
        g.cartIds.push(item.cartId);
      }
      return [...map.values()];
    };

    const _renderCartUI = () => {
      const itemsEl   = document.getElementById('cart-items');
      const summaryEl = document.getElementById('cart-summary');
      if (!itemsEl || !summaryEl) return;

      if (state.cart.length === 0) {
        itemsEl.innerHTML = `
          <div class="text-center py-16 text-stone-300">
            <p class="text-5xl mb-3">🛒</p>
            <p class="font-bold uppercase text-xs tracking-widest">Carrello vuoto</p>
          </div>`;
        summaryEl.innerHTML = '';
        return;
      }

      const groups = _groupCart();
      const total  = state.cart.reduce((s, i) => s + i.prezzo, 0);

      itemsEl.innerHTML = groups.map(g => `
        <div class="flex items-center justify-between bg-stone-50 p-4 rounded-[24px] border border-stone-100">
          <div class="min-w-0 pr-3">
            <p class="font-extrabold text-ink text-sm truncate">${g.nome}</p>
            <p class="text-brand font-black text-xs mt-0.5">€${(g.prezzo * g.qty).toFixed(2)}</p>
          </div>
          <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-stone-100 shrink-0">
            <button onclick="App.changeQty('${g.nome}', -1)"
                    class="text-brand font-black text-lg w-5 text-center leading-none active:scale-90 transition">−</button>
            <span class="font-black text-ink text-sm w-4 text-center">${g.qty}</span>
            <button onclick="App.changeQty('${g.nome}', 1)"
                    class="text-brand font-black text-lg w-5 text-center leading-none active:scale-90 transition">+</button>
          </div>
        </div>`).join('');

      summaryEl.innerHTML = `
        <div class="flex justify-between items-center px-1 mb-4 mt-2">
          <span class="text-stone-400 font-bold text-sm">Totale stimato</span>
          <span class="font-display font-black text-2xl text-brand">€${total.toFixed(2)}</span>
        </div>
        <button onclick="App.sendWA()"
                class="w-full bg-wa text-white py-5 rounded-[24px] font-black text-base shadow-xl active:scale-95 transition-all">
          📲 Invia ordine su WhatsApp
        </button>`;
    };

    // ─────────────────────────────────────────────
    // ERROR STATE
    // ─────────────────────────────────────────────
    const _renderError = () => {
      const el = document.getElementById('content');
      if (el) el.innerHTML = `
        <div class="text-center py-16 px-4">
          <p class="text-5xl mb-3">😕</p>
          <p class="font-bold text-ink/70">Impossibile caricare il menu.</p>
          <p class="text-sm text-stone-400 mt-2 leading-relaxed">
            Assicurati che il foglio sia pubblicato pubblicamente.<br>
            <b>File → Pubblica sul web → Foglio1 → CSV</b>
          </p>
          <button onclick="App.init()"
                  class="mt-6 px-6 py-3 bg-brand text-white rounded-2xl font-bold text-sm active:scale-95 transition">
            Riprova
          </button>
        </div>`;
    };

    // ─────────────────────────────────────────────
    // PUBLIC API
    // ─────────────────────────────────────────────
    return {

      // Entry point — called once on DOMContentLoaded
      init: async () => {
        _renderSkeletons();
        _loadCart();
        _updateBadge();

        const items = await fetchCSV(CONFIG.CSV);
        if (!items) { _renderError(); return; }

        state.items      = items;
        state.categories = ['Tutti', ...[...new Set(items.map(i => i.categoria))]];

        _renderTabs();
        _renderCards();
      },

      // Set active category — only re-renders, never re-fetches
      setCat: (cat) => {
        state.activeCat = cat;
        _renderTabs();
        _renderCards();
        // Scroll to listing area smoothly
        document.getElementById('content')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      },

      // Toggle filter chip
      toggleFilter: (f) => {
        state.filters[f] = !state.filters[f];
        document.getElementById(`chip-${f}`)?.classList.toggle('chip-active', state.filters[f]);
        _renderCards();
      },

      // Live search
      handleSearch: () => {
        state.search = document.getElementById('search-input')?.value.toLowerCase().trim() ?? '';
        _renderCards();
      },

      // Open item detail modal
      openDetail: (id) => {
        const item = state.items.find(i => i.id === id);
        if (!item) return;

        const showVariants = VARIANT_CATEGORIES.has(item.categoria);
        const ingTags = item.ingredienti
          .split(',')
          .map(t => t.trim())
          .filter(Boolean)
          .map(t => `<span class="ing-tag">${t}</span>`)
          .join('');

        const variantsHTML = showVariants ? `
          <div class="mb-6">
            <p class="text-[10px] font-black text-stone-300 uppercase mb-3 tracking-[.2em]">Varianti & aggiunte</p>
            <div class="bg-stone-50 rounded-[20px] px-4 divide-y divide-stone-100">
              <div class="flex justify-between py-3 text-sm"><span>Impasto Kamut / Khorasan</span><span class="font-black text-brand">+€1.20</span></div>
              <div class="flex justify-between py-3 text-sm"><span>Impasto Farro</span><span class="font-black text-brand">+€1.20</span></div>
              <div class="flex justify-between py-3 text-sm"><span>Aggiunta mozzarella di bufala</span><span class="font-black text-brand">+€2.00</span></div>
              <div class="flex justify-between py-3 text-sm"><span>Aggiunta ingrediente</span><span class="font-black text-brand">+€1–5</span></div>
            </div>
            <p class="text-[10px] text-stone-300 mt-2 px-1">Variazioni richiedibili telefonicamente</p>
          </div>` : '';

        document.getElementById('modal-content').innerHTML = `
          <div class="aspect-video w-full rounded-[28px] overflow-hidden mb-6 bg-stone-100">
            <img src="${resolveImg(item)}" alt="${item.nome}"
                 class="w-full h-full object-cover"
                 onerror="this.src='${ASSETS.pizza}';this.onerror=null" />
          </div>
          <div class="flex justify-between items-start mb-6 px-1">
            <div class="min-w-0 pr-4">
              <p class="text-brand font-black text-[10px] uppercase tracking-widest mb-1">${item.categoria}</p>
              <h2 class="font-display text-2xl font-bold text-ink leading-tight">${item.nome}</h2>
            </div>
            <span class="text-2xl font-black text-brand bg-brand/5 px-4 py-2 rounded-2xl shrink-0">€${item.prezzo.toFixed(2)}</span>
          </div>
          ${item.ingredienti ? `
          <div class="mb-6 px-1">
            <p class="text-[10px] font-black text-stone-300 uppercase mb-3 tracking-[.2em]">Ingredienti</p>
            <div class="flex flex-wrap">${ingTags || item.ingredienti}</div>
          </div>` : ''}
          ${item.allergeni ? `
          <div class="mx-1 p-4 bg-amber-50 rounded-[20px] border border-amber-100 mb-6">
            <p class="text-[10px] text-amber-700 font-black uppercase mb-1 tracking-widest">⚠️ Allergeni</p>
            <p class="text-xs text-amber-800 font-bold leading-relaxed">${item.allergeni}</p>
          </div>` : ''}
          ${variantsHTML}
          <button onclick="App.addToCart('${item.id}')"
                  class="w-full bg-brand text-white rounded-[22px] py-5 font-extrabold text-base shadow-[0_4px_20px_rgba(193,68,14,.35)] active:scale-95 transition-all">
            + Aggiungi all'ordine
          </button>`;

        document.getElementById('modal-detail').classList.add('open');
        document.body.classList.add('modal-open');
      },

      closeModal: () => {
        document.getElementById('modal-detail').classList.remove('open');
        document.body.classList.remove('modal-open');
      },

      // Add item to cart by ID — safe lookup, no JSON in HTML
      addToCart: (id) => {
        const item = state.items.find(i => i.id === id);
        if (!item) return;
        state.cart.push({ ...item, cartId: Date.now() });
        _saveCart();
        _updateBadge();
        App.closeModal();
      },

      // Change quantity by name group
      // +1 → clone last occurrence with new cartId
      // -1 → remove last occurrence of that name
      changeQty: (nome, delta) => {
        if (delta > 0) {
          const src = state.cart.findLast(i => i.nome === nome);
          if (src) state.cart.push({ ...src, cartId: Date.now() });
        } else {
          const idx = state.cart.findLastIndex(i => i.nome === nome);
          if (idx !== -1) state.cart.splice(idx, 1);
        }
        _saveCart();
        _updateBadge();
        _renderCartUI();
      },

      clearCart: () => {
        state.cart = [];
        _saveCart();
        _updateBadge();
        _renderCartUI();
      },

      openCart: () => {
        _renderCartUI();
        document.getElementById('modal-cart').classList.add('open');
        document.body.classList.add('modal-open');
      },

      closeCart: () => {
        document.getElementById('modal-cart').classList.remove('open');
        document.body.classList.remove('modal-open');
      },

      // Build WhatsApp message and open WA
      sendWA: () => {
        if (state.cart.length === 0) return;
        const groups = _groupCart();
        const total  = state.cart.reduce((s, i) => s + i.prezzo, 0);
        let msg = CONFIG.WA_INTRO;
        groups.forEach(g => { msg += `• ${g.qty}x *${g.nome}* – €${(g.prezzo * g.qty).toFixed(2)}\n`; });
        msg += `\n💰 *Totale: €${total.toFixed(2)}*`;
        window.open(`https://wa.me/${CONFIG.WA}?text=${encodeURIComponent(msg)}`, '_blank');
      },
    };

  })(); // end IIFE

  // ─── Bootstrap ───
  document.addEventListener('DOMContentLoaded', () => {
    App.init();

    // ESC closes any open modal
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      App.closeModal();
      App.closeCart();
    });

    // Back-to-top button visibility
    window.addEventListener('scroll', () => {
      document.getElementById('back-to-top')?.classList.toggle('show', window.scrollY > 500);
    }, { passive: true });
  });
  </script>
</body>
</html>
