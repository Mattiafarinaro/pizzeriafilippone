<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Menu Digitale</title>
  
  <!-- SEO & Social Engineering -->
  <meta name="description" content="Sfoglia il menu della Pizzeria Filippone a Trento. Pizze artigianali e specialità locali. Ordina via WhatsApp Business." />
  <meta property="og:title" content="Pizzeria Filippone – Menu" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=1000&auto=format&fit=crop" />

  <!-- Preconnect & Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['"Playfair Display"', 'serif'], body: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: { brand: { DEFAULT: '#C1440E', dark: '#8B2E07' }, ink: { DEFAULT: '#1A120B' }, whatsapp: '#25D366' },
          boxShadow: { 'ui': '0 10px 40px -10px rgba(0,0,0,0.08)', 'action': '0 8px 25px -5px rgba(193, 68, 14, 0.4)' }
        },
      },
    };
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FBF9F7; color: #1A120B; scroll-behavior: smooth; }
    body.modal-open { overflow: hidden; }

    /* UI Components */
    .item-card { display: grid; grid-template-columns: 110px 1fr; gap: 16px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @media (min-width: 480px) { .item-card { grid-template-columns: 140px 1fr; } }
    
    .modal-active { opacity: 1 !important; visibility: visible !important; }
    .modal-panel-active { transform: translateY(0) !important; }
    
    .chip-active { background-color: #C1440E !important; color: white !important; border-color: #C1440E !important; box-shadow: 0 4px 12px rgba(193, 68, 14, 0.25); }
    .ing-tag { background: #f3f4f6; color: #4b5563; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid #e5e7eb; display: inline-block; margin: 2px; }
    
    /* Fallback Image Style */
    .img-error { position: relative; background: #f3f4f6; }
    .img-error::after { content: "🍕"; position: absolute; inset: 0; display: flex; items-center; justify-center; font-size: 2rem; opacity: 0.3; }

    .skeleton { background: linear-gradient(90deg, #ede9e6 25%, #f5f2f0 50%, #ede9e6 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite linear; border-radius: 24px; height: 110px; }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="flex flex-col min-h-screen">

  <!-- HEADER -->
  <header class="bg-white px-6 pt-10 pb-8 text-center border-b border-stone-100">
    <div class="max-w-2xl mx-auto">
      <img src="logo.png" alt="Logo" class="h-20 w-auto mx-auto mb-5 object-contain" onerror="this.src='https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200&q=80'">
      <h1 class="font-display text-4xl font-bold text-ink mb-1 tracking-tight">Pizzeria Filippone</h1>
      <p class="text-ink/50 text-sm italic mt-2 px-6">"L'arte della vera pizza, tramandata da generazioni."</p>
      <div class="mt-6 inline-flex items-center gap-2 text-ink/40 text-[10px] font-black bg-stone-50 px-5 py-2.5 rounded-full border border-stone-100 uppercase tracking-widest">
        <svg class="w-3.5 h-3.5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-width="3" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Via Anna Frank n.7, 38123 Trento
      </div>
    </div>
  </header>

  <!-- SEARCH & CATEGORIES -->
  <div class="bg-white px-5 py-6 max-w-xl mx-auto w-full">
    <div class="mb-6 p-4 bg-brand/5 rounded-2xl border border-brand/10 text-center text-brand-dark font-bold text-[11px] leading-relaxed">
      Per ordinazioni via app non sono previste variazioni.<br>Richieste particolari? Usa il tasto <b>"Chiama"</b>.
    </div>
    <div class="relative mb-6">
      <input type="search" id="search-input" oninput="App.handleSearch()" placeholder="Cerca nel menu (es. Margherita, Coca...)" class="w-full pl-12 pr-4 py-4 rounded-2xl bg-stone-100/60 text-sm outline-none border-none focus:ring-2 focus:ring-brand/20 transition-all">
      <svg class="w-4 h-4 absolute left-5 top-1/2 -translate-y-1/2 text-stone-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <nav id="tab-bar" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar"></nav>
  </div>

  <!-- FILTERS & COUNTER -->
  <div class="bg-white/80 border-y border-stone-100 px-5 py-3 sticky top-0 z-30 backdrop-blur-md">
    <div class="flex items-center justify-between max-w-xl mx-auto w-full">
        <div class="flex gap-2 overflow-x-auto no-scrollbar">
            <button id="chip-veg" onclick="App.toggleFilter('veg')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">🌿 Veg</button>
            <button id="chip-spicy" onclick="App.toggleFilter('spicy')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">🌶️ Piccante</button>
            <button id="chip-frozen" onclick="App.toggleFilter('frozen')" class="shrink-0 text-[11px] font-bold px-4 py-2 rounded-xl border border-stone-200 bg-white text-ink transition-all">❄️ Surgelato</button>
        </div>
        <div id="result-count" class="pl-4 text-[10px] font-black uppercase text-stone-400 tracking-widest whitespace-nowrap">0 PRODOTTI</div>
    </div>
  </div>

  <!-- LISTA -->
  <main id="content" class="flex-1 px-5 pt-8 pb-48 space-y-6 max-w-xl mx-auto w-full"></main>

  <!-- ACTION BAR (FISSA A 3 PULSANTI) -->
  <div class="fixed bottom-0 left-0 right-0 z-40 bg-white/90 backdrop-blur-xl border-t border-stone-100 px-4 pt-4 pb-8 shadow-ui">
    <div class="flex gap-2 max-w-xl mx-auto h-14">
      <a href="tel:+390461924565" class="flex-1 bg-stone-900 text-white rounded-2xl font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>Chiama
      </a>
      <a href="https://wa.me/390461924565" target="_blank" class="flex-1 bg-whatsapp text-white rounded-2xl font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>WhatsApp
      </a>
      <button onclick="App.openCart()" class="flex-1 bg-brand text-white rounded-2xl font-bold text-[12px] flex items-center justify-center gap-2 active:scale-95 transition-all shadow-action">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        Carrello (<span id="cart-qty-footer">0</span>)
      </button>
    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-backdrop" class="fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="App.closeModal()">
    <div id="modal-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-500 overflow-y-auto max-h-[94vh] relative" onclick="event.stopPropagation()">
      <div class="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
      <button onclick="App.closeModal()" class="absolute top-6 right-6 bg-white shadow-lg p-3 rounded-full z-20 text-stone-900 border border-stone-100">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="cart-backdrop" class="fixed inset-0 z-50 bg-stone-900/70 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="App.closeCart()">
    <div id="cart-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-500 overflow-y-auto max-h-[92vh]" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-8 px-2">
        <h2 class="font-display text-3xl font-bold text-ink tracking-tight">Il tuo ordine</h2>
        <button onclick="App.clearCart()" class="text-[10px] font-black text-brand bg-brand/5 px-4 py-2 rounded-xl uppercase tracking-widest border border-brand/10">Svuota</button>
      </div>
      <div id="cart-items" class="space-y-4 mb-8"></div>
      <div id="cart-summary"></div>
    </div>
  </div>

  <!-- BACK TO TOP -->
  <button id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="fixed bottom-32 right-6 z-40 bg-stone-900 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-all scale-0">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"/></svg>
  </button>

  <script>
    /**
     * App Engine - Senior Developer Edition
     * Encapsulated to prevent global namespace pollution
     */
    const App = (() => {
      const CONFIG = {
        CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',
        WA_PHONE: '390461924565',
        STORAGE_KEY: 'filippone_v12_final'
      };

      const EMOJI_MAP = {
        'tutti': '🍽️', 'classica': '🍕', 'rossa': '🍅', 'bianca': '🧀', 'speciale': '✨',
        'antipast': '🫒', 'fritt': '🍟', 'sfiz': '😋', 'birra': '🍺', 'vino': '🍷',
        'bevand': '🥤', 'bibit': '🥤', 'lattin': '🥫', 'aperitiv': '🍹', 'cocktail': '🍸',
        'caff': '☕', 'amar': '🥃', 'liquor': '🥃', 'dolc': '🍮', 'dessert': '🍰', 'insalat': '🥗'
      };

      // State
      let state = {
        items: [],
        categories: [],
        activeCategory: 'Tutti',
        cart: [],
        search: '',
        filters: { veg: false, spicy: false, frozen: false }
      };

      // --- Helper: Robust Image Engine ---
      const getSafeImage = (item) => {
        if (item.immagine && item.immagine.length > 10 && item.immagine.startsWith('http')) return item.immagine;
        
        const n = (item.nome || "").toLowerCase();
        const c = (item.categoria || "").toLowerCase();
        const base = "https://images.unsplash.com/";

        // Map categories to high-stability Unsplash photo IDs
        if (c.includes('vino') || n.includes('vino')) return base + "photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&w=400&q=80";
        if (n.includes('acqua')) return base + "photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=400&q=80";
        if (c.includes('birra') || n.includes('birra')) return base + "photo-1535958636474-b021ee887b13?auto=format&fit=crop&w=400&q=80";
        if (c.includes('caff') || n.includes('espresso')) return base + "photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400&q=80";
        if (c.includes('dolc')) return base + "photo-1551024601-bec78aea704b?auto=format&fit=crop&w=400&q=80";
        if (c.includes('aperitiv') || n.includes('spritz')) return base + "photo-1536935338218-841273f2a64c?auto=format&fit=crop&w=400&q=80";
        if (c.includes('bianca')) return base + "photo-1513104890138-7c749659a591?auto=format&fit=crop&w=400&q=80";
        
        return base + "photo-1574071318508-1cdbad80ad38?auto=format&fit=crop&w=400&q=80";
      };

      // --- Data Parsing ---
      const parseCSV = (text) => {
        const cleanText = text.replace(/^\uFEFF/, "").trim();
        const lines = cleanText.split(/\r?\n/).filter(l => l.trim().length > 0);
        const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
        
        const fIdx = (ks) => headers.findIndex(h => ks.some(k => h.includes(k)));
        const col = {
          id: fIdx(['id']), nome: fIdx(['nome']), cat: fIdx(['categoria']), ing: fIdx(['ingredienti']),
          all: fIdx(['allergeni']), pre: fIdx(['prezzo', '€']), img: fIdx(['immagine', 'url']),
          var: fIdx(['varianti']), veg: fIdx(['isveg']), spi: fIdx(['isspicy']), fro: fIdx(['isfrozen'])
        };

        return lines.slice(1).map(line => {
          const v = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
          const g = (i) => v[i]?.replace(/^"|"$/g, '').trim() || "";
          return {
            id: g(col.id) || Math.random().toString(36).substr(2, 9),
            nome: g(col.nome), categoria: g(col.cat) || "Altro", ingredienti: g(col.ing),
            allergeni: g(col.all), varianti: g(col.var),
            prezzo: parseFloat(g(col.pre).replace('€', '').replace(',', '.')) || 0,
            immagine: g(col.img), isVeg: g(col.veg).toUpperCase() === 'SI',
            isSpicy: g(col.spi).toUpperCase() === 'SI', isFrozen: g(col.fro).toUpperCase() === 'SI'
          };
        }).filter(i => i.nome.length > 1);
      };

      // --- Renderers ---
      const renderTabs = () => {
        const bar = document.getElementById('tab-bar');
        if (!bar) return;
        bar.innerHTML = state.categories.map(cat => {
          const low = cat.toLowerCase();
          let em = '🍕';
          for (const [k, e] of Object.entries(EMOJI_MAP)) { if (low.includes(k)) { em = e; break; } }
          const active = cat === state.activeCategory;
          return `<button onclick="App.setCategory('${cat}')" class="shrink-0 flex items-center gap-2 px-6 py-3.5 rounded-2xl text-[13px] font-extrabold border transition-all ${active ? 'bg-stone-900 text-white border-stone-900 shadow-xl' : 'bg-white text-stone-400 border-stone-100'}"><span>${em}</span> ${cat}</button>`;
        }).join('');
      };

      const renderCards = () => {
        const container = document.getElementById('content');
        if (!container) return;
        
        let filtered = state.items.filter(i => (state.activeCategory === 'Tutti' || i.categoria === state.activeCategory));
        if (state.search) filtered = filtered.filter(i => i.nome.toLowerCase().includes(state.search) || i.ingredienti.toLowerCase().includes(state.search));
        if (state.filters.veg) filtered = filtered.filter(i => i.isVeg);
        if (state.filters.spicy) filtered = filtered.filter(i => i.isSpicy);
        if (state.filters.frozen) filtered = filtered.filter(i => i.isFrozen);

        document.getElementById('result-count').textContent = `${filtered.length} PRODOTTI`;
        
        container.innerHTML = filtered.map(item => `
          <div class="item-card bg-white rounded-[32px] p-4 border border-stone-100 shadow-sm active:scale-[0.98] cursor-pointer" onclick="App.openItemDetail('${item.id}')">
            <div class="aspect-square rounded-[24px] overflow-hidden bg-stone-100 relative">
              <img src="${getSafeImage(item)}" class="w-full h-full object-cover" loading="lazy" onerror="this.parentElement.classList.add('img-error'); this.style.display='none'">
              <div class="absolute top-2 right-2 flex flex-col gap-1">
                ${item.isVeg ? '<span class="bg-white/95 backdrop-blur px-1.5 py-1 rounded-lg text-[10px] shadow-sm">🌿</span>' : ''}
                ${item.isSpicy ? '<span class="bg-white/95 backdrop-blur px-1.5 py-1 rounded-lg text-[10px] shadow-sm">🌶️</span>' : ''}
              </div>
            </div>
            <div class="flex flex-col justify-center min-w-0 pr-2">
              <div class="flex justify-between items-start mb-1 gap-2">
                <h3 class="font-extrabold text-ink text-[17px] leading-tight truncate">${item.nome}</h3>
                <span class="font-black text-brand shrink-0 text-base tracking-tighter">€${item.prezzo.toFixed(2)}</span>
              </div>
              <p class="text-stone-400 text-xs leading-relaxed line-clamp-2 font-medium">${item.ingredienti}</p>
            </div>
          </div>`).join('');
      };

      // --- Public Methods ---
      return {
        init: async () => {
          const proxies = [ u => `https://corsproxy.io/?${encodeURIComponent(u)}`, u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` ];
          let raw = "";
          for (let p of proxies) {
            try {
              const res = await fetch(p(CONFIG.CSV_URL));
              if (res.ok) { raw = await res.text(); break; }
            } catch (e) {}
          }
          if (raw) {
            state.items = parseCSV(raw);
            state.categories = ['Tutti', ...new Set(state.items.map(i => i.categoria))];
            renderTabs();
            renderCards();
          }
          // Load Cart
          const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
          if (saved) { state.cart = JSON.parse(saved); App.syncCart(); }
        },

        setCategory: (c) => { state.activeCategory = c; renderTabs(); renderCards(); },
        toggleFilter: (f) => { 
          state.filters[f] = !state.filters[f]; 
          const btn = document.getElementById(`chip-${f}`);
          if (btn) btn.classList.toggle('chip-active', state.filters[f]);
          renderCards(); 
        },
        handleSearch: () => { state.search = document.getElementById('search-input').value.toLowerCase(); renderCards(); },
        
        openItemDetail: (id) => {
          const item = state.items.find(i => i.id === id);
          if (!item) return;
          const tags = item.ingredienti.split(',').filter(t => t.trim()).map(t => `<span class="ing-tag">${t.trim()}</span>`).join('');
          document.body.classList.add('modal-open');
          document.getElementById('modal-content').innerHTML = `
            <div class="aspect-video w-full rounded-[32px] overflow-hidden mb-6 bg-stone-100 shadow-inner">
              <img src="${getSafeImage(item)}" class="w-full h-full object-cover">
            </div>
            <div class="flex justify-between items-start mb-6 px-2">
              <div class="min-w-0 pr-4">
                <h2 class="text-3xl font-display font-extrabold text-ink leading-tight truncate">${item.nome}</h2>
                <p class="text-brand font-black text-[11px] uppercase mt-2 tracking-widest leading-none">${item.categoria}</p>
              </div>
              <span class="text-2xl font-black text-brand bg-brand/5 px-5 py-2.5 rounded-2xl shrink-0">€${item.prezzo.toFixed(2)}</span>
            </div>
            <div class="mb-8 px-2"><p class="text-[10px] font-black text-stone-300 uppercase mb-4 tracking-[0.2em]">Ingredienti</p><div class="flex flex-wrap">${tags || 'Vedi descrizione'}</div></div>
            ${item.varianti ? `<p class="text-[11px] text-stone-400 mb-8 italic font-bold uppercase px-2">Varianti: ${item.varianti}</p>` : ''}
            ${item.allergeni ? `<div class="mx-2 p-5 bg-amber-50/50 rounded-[28px] border border-amber-100 mb-8"><p class="text-[10px] text-amber-700 font-black uppercase mb-2 tracking-widest">⚠️ Allergeni</p><p class="text-xs text-amber-800 font-bold leading-relaxed">${item.allergeni}</p></div>` : ''}
            <button onclick="App.addToCart('${item.id}')" class="w-full bg-brand text-white rounded-[24px] py-6 font-extrabold text-lg shadow-action active:scale-[0.96] transition-all">Aggiungi all'ordine</button>`;
          document.getElementById('modal-backdrop').classList.add('modal-active');
          setTimeout(() => document.getElementById('modal-panel').classList.add('modal-panel-active'), 10);
        },

        addToCart: (id) => {
          const item = state.items.find(i => i.id === id);
          state.cart.push({ ...item, cartId: Date.now() });
          App.syncCart();
          App.closeModal();
        },

        syncCart: () => {
          localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(state.cart));
          const footerQty = document.getElementById('cart-qty-footer');
          if (footerQty) footerQty.textContent = state.cart.length;
          if (document.getElementById('cart-backdrop').classList.contains('modal-active')) App.renderCartUI();
        },

        changeQty: (cartId, delta) => {
          if (delta > 0) {
            const item = state.cart.find(i => i.cartId === cartId);
            state.cart.push({...item, cartId: Date.now()});
          } else {
            const idx = state.cart.findIndex(i => i.cartId === cartId);
            if(idx !== -1) state.cart.splice(idx, 1);
          }
          App.syncCart();
        },

        renderCartUI: () => {
          const container = document.getElementById('cart-items');
          if(!container) return;
          if(state.cart.length === 0) { container.innerHTML = `<div class="text-center py-20 text-stone-300 font-black uppercase text-xs">Il carrello è vuoto</div>`; document.getElementById('cart-summary').innerHTML = ""; return; }
          
          const grouped = state.cart.reduce((acc, item) => {
            if(!acc[item.nome]) acc[item.nome] = { ...item, qty: 0, ids: [] };
            acc[item.nome].qty++;
            acc[item.nome].ids.push(item.cartId);
            return acc;
          }, {});

          container.innerHTML = Object.values(grouped).map(item => `
            <div class="bg-stone-50 p-6 rounded-[32px] flex justify-between items-center border border-stone-100 shadow-sm">
              <div class="min-w-0 pr-4"><p class="font-extrabold text-ink truncate">${item.nome}</p><p class="text-brand font-black text-sm">€${(item.prezzo * item.qty).toFixed(2)}</p></div>
              <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-xl shadow-sm border border-stone-100 shrink-0">
                <button onclick="App.changeQty(${item.ids[0]}, -1)" class="text-brand font-black p-1 active:scale-150 transition-all text-lg">-</button>
                <span class="font-black text-ink text-sm w-4 text-center">${item.qty}</span>
                <button onclick="App.changeQty(${item.ids[0]}, 1)" class="text-brand font-black p-1 active:scale-150 transition-all text-lg">+</button>
              </div>
            </div>`).join('');
          
          const total = state.cart.reduce((acc, i) => acc + i.prezzo, 0);
          document.getElementById('cart-summary').innerHTML = `<button onclick="App.sendWhatsApp()" class="w-full bg-whatsapp text-white py-6 rounded-[24px] font-black text-lg shadow-xl active:scale-95 transition-all">WhatsApp (Tot: €${total.toFixed(2)})</button>`;
        },

        openCart: () => { App.renderCartUI(); document.body.classList.add('modal-open'); document.getElementById('cart-backdrop').classList.add('modal-active'); setTimeout(() => document.getElementById('cart-panel').classList.add('modal-panel-active'), 10); },
        clearCart: () => { state.cart = []; App.syncCart(); App.closeCart(); },
        closeModal: () => { document.body.classList.remove('modal-open'); document.getElementById('modal-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('modal-backdrop').classList.remove('modal-active'), 300); },
        closeCart: () => { document.body.classList.remove('modal-open'); document.getElementById('cart-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('cart-backdrop').classList.remove('modal-active'), 300); },

        sendWhatsApp: () => {
          if(state.cart.length === 0) return;
          const grouped = state.cart.reduce((acc, i) => { acc[i.nome] = (acc[i.nome] || 0) + 1; return acc; }, {});
          const total = state.cart.reduce((acc, i) => acc + i.prezzo, 0);
          let msg = "🍕 *NUOVO ORDINE - PIZZERIA FILIPPONE*\n\n";
          Object.entries(grouped).forEach(([n, q]) => { msg += `• ${q}x *${n}*\n`; });
          msg += `\n💰 *TOTALE: €${total.toFixed(2)}*\n\nAttendo conferma orario. Grazie!`;
          window.open(`https://wa.me/${CONFIG.WA_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }
      };
    })();

    // Initial Launch
    document.addEventListener('DOMContentLoaded', () => { 
      App.init(); 
      window.addEventListener('scroll', () => {
        const btn = document.getElementById('back-to-top');
        if (btn) {
          if (window.scrollY > 600) { btn.style.transform = 'scale(1)'; btn.style.opacity = '1'; }
          else { btn.style.transform = 'scale(0)'; btn.style.opacity = '0'; }
        }
      });
    });

    function renderSkeletons() { document.getElementById('content').innerHTML = Array(4).fill('<div class="skeleton mb-4"></div>').join(''); }
  </script>
</body>
</html>
