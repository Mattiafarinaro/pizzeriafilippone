<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Menu Digitale</title>

  <meta name="description" content="Menu digitale della Pizzeria Filippone. Dal 1966. Pizze, antipasti e bevande." />
  <meta property="og:type" content="restaurant.restaurant" />
  <meta property="og:title" content="Pizzeria Filippone – Menu Digitale" />
  <meta property="og:description" content="Sfoglia il menu, filtra per vegetariano o piccante e ordina direttamente!" />
  <meta property="og:image" content="https://filipponepizzeria.github.io/og-image.jpg" /> <meta property="og:url" content="https://filipponepizzeria.github.io/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            brand:  { DEFAULT: '#C1440E', light: '#E85D20', dark: '#8B2E07' },
            cream:  { DEFAULT: '#FAF6EF', dark: '#F0E8D8' },
            ink:    { DEFAULT: '#1A120B', muted: '#6B5744' },
          },
          animation: {
            'fade-in':    'fadeIn .35s ease forwards',
            'slide-up':   'slideUp .4s ease forwards',
            'shimmer':    'shimmer 1.4s infinite linear',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
          },
          keyframes: {
            fadeIn:  { from:{ opacity:0 }, to:{ opacity:1 } },
            slideUp: { from:{ opacity:0, transform:'translateY(12px)' }, to:{ opacity:1, transform:'translateY(0)' } },
            shimmer: { '0%':{ backgroundPosition:'-400px 0' }, '100%':{ backgroundPosition:'400px 0' } },
          },
        },
      },
    };
  </script>

  <style>
    /* ─── Base ─── */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF6EF;
      color: #1A120B;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C1440E55; border-radius: 2px; }

    /* ─── Tab bar ─── */
    #tab-bar { scrollbar-width: none; }
    #tab-bar::-webkit-scrollbar { display: none; }

    /* ─── Skeleton shimmer ─── */
    .skeleton {
      background: linear-gradient(90deg, #e8ddd0 25%, #f5ede0 50%, #e8ddd0 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    /* ─── Card hover ─── */
    .menu-card {
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .menu-card:active { transform: scale(.985); }

    /* ─── Badge pill ─── */
    .badge { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; letter-spacing:.03em; }

    /* ─── Sticky bottom safe-area ─── */
    #action-bar { padding-bottom: max(16px, env(safe-area-inset-bottom)); }

    /* ─── Filter chip active ─── */
    .chip.active { background: #C1440E; color: #fff; border-color: #C1440E; }

    /* ─── Hero texture ─── */
    #hero::after {
      content:'';
      position:absolute; inset:0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.03) 3px,
        rgba(0,0,0,.03) 6px
      );
      pointer-events:none;
    }

    /* staggered animation for cards */
    .menu-card { opacity:0; }
    .menu-card.visible { animation: slide-up .38s ease forwards; }
    @keyframes slide-up {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<body class="flex flex-col h-full">

  <header id="hero" class="relative bg-brand text-cream overflow-hidden shrink-0" style="min-height:120px;">
    <div class="absolute -top-8 -right-8 w-40 h-40 rounded-full bg-brand-light opacity-30"></div>
    <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-64 h-1 bg-cream opacity-10 rounded-full"></div>

    <div class="relative z-10 px-5 pt-8 pb-4">
      <p class="text-xs tracking-[.2em] uppercase text-cream/60 font-body mb-1">Dal 1966</p>
      <h1 class="font-display text-3xl font-bold leading-tight">Filippone</h1>
      <p class="text-cream/70 text-sm mt-1 font-body">Qualità e tradizione dal 1966</p>
    </div>
  </header>

  <nav id="tab-bar" class="shrink-0 flex gap-2 overflow-x-auto px-4 py-3 bg-cream-dark border-b border-ink/10 sticky top-0 z-30">
    </nav>

  <div class="shrink-0 flex gap-2 px-4 py-2 bg-cream sticky top-[56px] z-20 border-b border-ink/5">
    <button id="chip-veg"   class="chip flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-full border border-green-600 text-green-700 bg-green-50 transition-all" onclick="toggleFilter('veg')">
      🌿 Veg
    </button>
    <button id="chip-spicy" class="chip flex items-center gap-1.5 text-xs font-semibold px-3 py-1.5 rounded-full border border-orange-500 text-orange-600 bg-orange-50 transition-all" onclick="toggleFilter('spicy')">
      🌶️ Piccante
    </button>
    <div id="result-count" class="ml-auto text-xs text-ink/40 self-center shrink-0"></div>
  </div>

  <main id="content" class="flex-1 overflow-y-auto pb-32 px-4 pt-4 space-y-3">
    </main>

  <div id="action-bar" class="fixed bottom-0 left-0 right-0 z-40 bg-cream/95 backdrop-blur border-t border-ink/10 px-4 pt-3">
    <div class="flex gap-3 max-w-lg mx-auto">
      <a href="tel:+390461924565"
         class="flex items-center justify-center gap-2 bg-ink text-cream rounded-2xl py-3.5 px-5 font-semibold text-sm transition active:scale-95 shrink-0">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.56-.56a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>
        Chiama
      </a>
      <a href="https://wa.me/390461924565?text=Ciao Filippone! 🍕 Vorrei ordinare: "
         class="flex-1 flex items-center justify-center gap-2 bg-green-600 text-cream rounded-2xl py-3.5 font-semibold text-sm transition active:scale-95">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.474 2.027 7.78L0 32l8.47-2.22A15.93 15.93 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm8.087 22.357c-.34.955-1.987 1.827-2.717 1.942-.694.108-1.57.154-2.532-.159a23.05 23.05 0 01-2.292-.847C12.7 21.677 10.03 18.9 9.61 18.362c-.42-.538-1.54-2.046-1.54-3.905 0-1.86.977-2.775 1.32-3.155.343-.38.75-.476.999-.476l.714.014c.229.01.537-.087.84.64.318.756 1.08 2.616 1.174 2.806.095.19.158.413.031.666-.127.253-.19.413-.381.635-.19.222-.4.497-.571.666-.19.19-.388.396-.167.776.222.38.985 1.624 2.115 2.63 1.452 1.292 2.676 1.692 3.057 1.882.38.19.603.159.825-.095.222-.254.952-1.11 1.206-1.49.254-.38.508-.317.856-.19.349.127 2.21 1.042 2.59 1.232.38.19.634.285.728.444.096.16.096.928-.244 1.883z"/></svg>
        WhatsApp
      </a>
    </div>
  </div>

  <script>
  // ──────────────────────────────────────────────
  // CONFIGURAZIONE – modifica questi valori
  // ──────────────────────────────────────────────
  const CONFIG = {
    // Pubblica il tuo Google Sheet come CSV:
    // File → Pubblica sul Web → Foglio1 → CSV
    CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',
  };

  // ──────────────────────────────────────────────
  // GOOGLE SHEETS COLUMN MAPPING
  // Il tuo foglio deve avere ESATTAMENTE queste intestazioni
  // nella prima riga (case-sensitive):
  //  ID | Nome | Categoria | Ingredienti | Allergeni | Prezzo (€) | Disponibile | Immagine URL | IsVeg | IsSpicy
  //  IsVeg   → "SI" / "NO" o "TRUE"/"FALSE"
  //  IsSpicy → "SI" / "NO" o "TRUE"/"FALSE"
  //  Disponibile → "SI" / "NO" o "TRUE"/"FALSE"
  // ──────────────────────────────────────────────

  // ─── State ───
  let allItems       = [];
  let activeCategory = 'Tutti';
  let filters        = { veg: false, spicy: false };

  // ─── Categories (injected) ───
  let categories = ['Tutti'];
  const CAT_EMOJI = {
    'Tutti':'🍽️','Antipasti':'🫒','Insalate':'🥗','Pizze':'🍕','Bevande':'🍺','Dolci':'🍮','Senza Categoria':'❓'
  };

  // ─── Init ───
  document.addEventListener('DOMContentLoaded', () => {
    renderSkeletons();
    loadData();
  });

  // ─── CSV fetch & parse ───
  async function loadData() {
    const csvUrl = CONFIG.CSV_URL;

    // Proxy cascade: prova in ordine finché uno funziona
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(csvUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`,
      csvUrl, // tentativo diretto
    ];

    let lastError = '';
    const labels = ['corsproxy.io', 'allorigins.win', 'diretto'];
    for (let i = 0; i < proxies.length; i++) {
      const url = proxies[i];
      const statusEl = document.getElementById('load-status');
      if (statusEl) statusEl.textContent = `Tentativo ${i+1}/3 via ${labels[i]}...`;
      try {
        const r = await fetch(url, { cache: 'no-store' }); // No cache per evitare vecchi dati
        if (!r.ok) { lastError = `HTTP ${r.status}`; continue; }
        const text = await r.text();
        if (!text || text.trim().length < 10) { lastError = 'Risposta vuota'; continue; }
        const parsed = parseCSV(text);
        if (!parsed.length) { lastError = 'CSV vuoto o intestazioni errate'; continue; }
        allItems = parsed;
        extractCategories();
        renderTabs();
        renderCards();
        return; // successo, esci
      } catch(e) {
        lastError = `[${labels[i]}] ${e.message}`;
        continue;
      }
    }

    // Tutti i proxy hanno fallito
    document.getElementById('content').innerHTML =
      `<div class="text-center py-16" style="color:#6B5744;padding:2rem">
        <p style="font-size:2.5rem;margin-bottom:.75rem">😕</p>
        <p style="font-weight:700;font-size:1.1rem">Errore nel caricamento del foglio Google.</p>
        <p style="font-size:.85rem;margin-top:.5rem;opacity:.7;line-height:1.6">
          Assicurati che il foglio sia pubblicato pubblicamente.<br>
          <b>File → Pubblica sul web → Foglio1 → CSV</b>
        </p>
        <p style="font-size:.7rem;margin-top:1rem;opacity:.4;font-family:monospace">Load failed</p>
      </div>`;
  }

  function parseCSV(text) {
    // Normalize line endings
    const lines = text.trim().replace(/\r\n/g, '\n').split('\n');
    const headers = splitCSVLine(lines[0]).map(h => h.trim());

    return lines.slice(1).map(line => {
      if (!line.trim()) return null;
      const vals = splitCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = vals[i] || ''; });

      // Strip € symbol and handle Italian decimal comma
      const rawPrice = (obj['Prezzo (€)'] || obj['Prezzo'] || '0')
        .replace(/[€$£\s]/g, '')
        .replace(',', '.');

      const isVegVal   = (obj['IsVeg']   || obj['Is Veg']   || '').toUpperCase();
      const isSpicyVal = (obj['IsSpicy'] || obj['Is Spicy'] || '').toUpperCase();
      const trueVals   = ['SI', 'S\u00cc', 'YES', '1', 'TRUE'];

      return {
        id:          obj['ID']           || String(Math.random()),
        nome:        obj['Nome']         || '',
        categoria:   obj['Categoria']    || 'Senza Categoria',
        ingredienti: obj['Ingredienti']  || '',
        allergeni:   obj['Allergeni']    || '',
        prezzo:      parseFloat(rawPrice) || 0,
        disponibile: (obj['Disponibile'] || 'SI').toUpperCase() !== 'NO',
        immagine:    obj['Immagine URL'] || '',
        isVeg:       trueVals.includes(isVegVal),
        isSpicy:     trueVals.includes(isSpicyVal),
      };
    }).filter(i => i && i.disponibile && i.nome);
  }

  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += line[i]; }
    }
    result.push(cur);
    return result;
  }

  // ─── Categories ───
  function extractCategories() {
    categories = ['Tutti', ...new Set(allItems.map(i => i.categoria))];
  }

  function renderTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = categories.map(cat => `
      <button onclick="setCategory('${cat}')"
        id="tab-${cat}"
        class="shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all
               ${cat === activeCategory
                 ? 'bg-brand text-cream shadow-md'
                 : 'bg-cream text-ink/60 border border-ink/15'}">
        <span>${CAT_EMOJI[cat] || CAT_EMOJI['Senza Categoria']}</span> ${cat}
      </button>
    `).join('');
  }

  function setCategory(cat) {
    activeCategory = cat;
    renderTabs();
    renderCards();
  }

  // ─── Filters ───
  function toggleFilter(f) {
    filters[f] = !filters[f];
    document.getElementById(`chip-${f}`).classList.toggle('active', filters[f]);
    renderCards();
  }

  // ─── Skeleton ───
  function renderSkeletons() {
    const c = document.getElementById('content');
    c.innerHTML = `<p id="load-status" style="text-align:center;font-size:.7rem;color:#aaa;padding:.5rem 1rem;font-family:monospace">Caricamento menu in corso...</p>` +
    Array(5).fill(0).map(() => `
      <div class="bg-white rounded-2xl p-4 flex gap-3 shadow-sm border border-ink/5">
        <div class="skeleton w-20 h-20 rounded-xl shrink-0"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="skeleton h-4 w-3/4"></div>
          <div class="skeleton h-3 w-full"></div>
          <div class="skeleton h-3 w-2/3"></div>
          <div class="skeleton h-4 w-1/4 mt-2"></div>
        </div>
      </div>
    `).join('');
  }

  // ─── Cards ───
  function renderCards() {
    let items = activeCategory === 'Tutti'
      ? allItems
      : allItems.filter(i => i.categoria === activeCategory);

    if (filters.veg)   items = items.filter(i => i.isVeg);
    if (filters.spicy) items = items.filter(i => i.isSpicy);

    const count = document.getElementById('result-count');
    count.textContent = `${items.length} voci`;

    if (!items.length) {
      document.getElementById('content').innerHTML = `
        <div class="text-center py-20 text-ink/40">
          <p class="text-5xl mb-4">🔍</p>
          <p class="font-semibold text-ink/60">Nessun risultato</p>
          <p class="text-sm mt-1">Prova a cambiare filtro o categoria</p>
        </div>`;
      return;
    }

    const html = items.map((item, idx) => {
      const hasImg = item.immagine && item.immagine !== '';
      const badges = [
        item.isVeg   ? '<span class="badge bg-green-100 text-green-700">🌿 Veg</span>' : '',
        item.isSpicy ? '<span class="badge bg-orange-100 text-orange-700">🌶️ Piccante</span>' : '',
      ].filter(Boolean).join('');
      const allergens = item.allergeni
        ? item.allergeni.split(',').map(a => `<span class="badge bg-yellow-100 text-yellow-800">${a.trim()}</span>`).join('')
        : '';
      const priceStr = item.prezzo ? `€${item.prezzo.toFixed(2)}` : '–';

      return `
      <div class="menu-card bg-white rounded-2xl shadow-sm border border-ink/5 overflow-hidden" style="animation-delay: ${idx * 40}ms">
        <div class="flex gap-3 p-4">
          ${hasImg
            ? `<img src="${item.immagine}" alt="${item.nome}"
                 class="w-20 h-20 object-cover rounded-xl shrink-0 bg-cream"
                 loading="lazy" onerror="this.src='https://via.placeholder.com/80x80/FAF6EF/1A120B?text=🍕'" />`
            : `<div class="w-20 h-20 rounded-xl shrink-0 bg-cream-dark flex items-center justify-center text-3xl select-none">🍕</div>`
          }
          <div class="flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <h3 class="font-display font-bold text-lg leading-tight text-ink">${item.nome}</h3>
              <span class="text-brand font-bold text-lg shrink-0">${priceStr}</span>
            </div>
            <p class="text-ink/55 text-xs mt-1 line-clamp-2 leading-relaxed">${item.ingredienti || ''}</p>
            ${allergens ? `<div class="flex flex-wrap gap-1.5 mt-2 opacity-50">${allergens}</div>` : ''}
            ${badges ? `<div class="flex gap-1.5 mt-2">${badges}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('content').innerHTML = html;

    // Stagger animation
    requestAnimationFrame(() => {
      document.querySelectorAll('.menu-card').forEach(el => {
        el.classList.add('visible');
      });
    });
  }
  </script>
</body>
</html>
