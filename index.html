<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Menu Digitale</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: { DEFAULT: '#C1440E', light: '#E85D20', dark: '#8B2E07' },
            cream: { DEFAULT: '#FAF6EF', dark: '#F0E8D8' },
            ink: { DEFAULT: '#1A120B' },
          },
        },
      },
    };
  </script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAF6EF; color: #1A120B; }
    
    .glass { background: rgba(250, 246, 239, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    
    /* Animazione Modal Bottom Sheet */
    .modal-active { opacity: 1 !important; visibility: visible !important; }
    .modal-panel-active { transform: translateY(0) !important; }

    /* Stili per la stampa */
    @media print {
      body * { visibility: hidden; }
      #print-section, #print-section * { visibility: visible; }
      #print-section { position: absolute; left: 0; top: 0; width: 100%; }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    .skeleton { background: linear-gradient(90deg, #f0e8d8 25%, #f9f3e9 50%, #f0e8d8 75%); background-size: 400px 100%; animation: shimmer 1.5s infinite linear; }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
  </style>
</head>

<body class="flex flex-col min-h-screen">

  <!-- SEZIONE STAMPA (Nascosta) -->
  <div id="print-section" class="hidden p-8">
    <h1 class="text-2xl font-bold mb-4">Pizzeria Filippone - Riepilogo Ordine</h1>
    <div id="print-content" class="space-y-2"></div>
    <div id="print-total" class="mt-6 text-xl font-bold border-t pt-4"></div>
  </div>

  <!-- HEADER -->
  <header class="bg-brand text-cream px-6 pt-12 pb-8 relative overflow-hidden">
    <div class="relative z-10">
      <div class="inline-block px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold uppercase tracking-widest mb-3">Dal 1966 • Trento</div>
      <h1 class="font-display text-5xl font-bold leading-tight">Pizzeria<br>Filippone</h1>
    </div>
    <button onclick="openCart()" class="absolute top-8 right-6 bg-white/10 p-4 rounded-2xl border border-white/20 active:scale-90 transition">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-white text-brand text-[10px] font-black rounded-full w-5 h-5 flex items-center justify-center">0</span>
    </button>
  </header>

  <!-- BARRA RICERCA E CATEGORIE -->
  <div class="sticky top-0 z-30 glass border-b border-ink/5">
    <div class="px-5 py-4">
      <input type="search" id="search-input" oninput="handleSearch()" placeholder="Cerca nel menu..." class="w-full pl-6 pr-4 py-3.5 rounded-2xl bg-ink/[0.04] text-sm outline-none focus:ring-2 focus:ring-brand/20">
    </div>
    <nav id="tab-bar" class="flex gap-2 overflow-x-auto px-5 pb-4 no-scrollbar"></nav>
  </div>

  <!-- FILTRI -->
  <div class="flex items-center gap-2 px-5 py-3 bg-cream/50 border-b border-ink/5">
    <button id="chip-veg" onclick="toggleFilter('veg')" class="text-[11px] font-bold px-4 py-2 rounded-xl border border-ink/10 bg-white">🌿 Veg</button>
    <button id="chip-spicy" onclick="toggleFilter('spicy')" class="text-[11px] font-bold px-4 py-2 rounded-xl border border-ink/10 bg-white">🌶️ Piccante</button>
    <div id="result-count" class="ml-auto text-[10px] font-bold uppercase text-ink/30 tracking-widest">Caricamento...</div>
  </div>

  <!-- MENU LIST -->
  <main id="content" class="flex-1 px-5 pt-4 pb-32 space-y-4"></main>

  <!-- ACTION BAR IN BASSO -->
  <div class="fixed bottom-0 left-0 right-0 z-40 glass border-t border-ink/5 px-5 pt-4 pb-8">
    <div class="flex gap-3 max-w-xl mx-auto">
      <a href="tel:+390461924565" class="bg-ink text-white rounded-2xl px-6 py-4 font-bold text-sm flex items-center gap-2 active:scale-95 transition-all">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
        Chiama
      </a>
      <button onclick="openCart()" class="flex-1 bg-brand text-white rounded-2xl px-6 py-4 font-bold text-sm flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
        Vedi Ordine <span id="cart-qty-footer" class="bg-white/20 px-3 py-0.5 rounded-lg ml-2">0 prodotti</span>
      </button>
    </div>
  </div>

  <!-- MODAL SCHEDA PRODOTTO (Bottom Sheet) -->
  <div id="modal-backdrop" class="fixed inset-0 z-50 bg-ink/60 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="closeModal()">
    <div id="modal-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-400 overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
      <div class="w-12 h-1.5 bg-ink/10 rounded-full mx-auto mb-6"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- MODAL CARRELLO (Bottom Sheet) -->
  <div id="cart-backdrop" class="fixed inset-0 z-50 bg-ink/60 backdrop-blur-sm opacity-0 invisible transition-all duration-300 flex items-end justify-center" onclick="closeCart()">
    <div id="cart-panel" class="bg-white w-full max-w-xl rounded-t-[40px] p-8 pb-12 translate-y-full transition-transform duration-400 overflow-y-auto max-h-[85vh]" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-8">
        <h2 class="font-display text-3xl font-bold">Il tuo ordine</h2>
        <button onclick="clearCart()" class="text-xs font-bold text-brand bg-brand/5 px-4 py-2 rounded-xl">Svuota</button>
      </div>
      <div id="cart-items" class="space-y-4 mb-8"></div>
      <div id="cart-summary"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',
      WA_PHONE: '390461924565',
      WA_PREAMBLE: 'Ciao Filippone! 🍕 Vorrei ordinare:\n\n'
    };

    let allItems = [], categories = ['Tutti'], activeCategory = 'Tutti', filters = { veg: false, spicy: false }, searchTerm = '', cart = [];
    const CAT_EMOJI = { 'Tutti':'🍽️','Antipasti':'🫒','Insalate':'🥗','Pizze':'🍕','Bevande':'🍺','Dolci':'🍮' };

    document.addEventListener('DOMContentLoaded', () => {
        renderSkeletons();
        loadData();
        loadCart();
    });

    async function loadData() {
        try {
            const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(CONFIG.CSV_URL)}`);
            const text = await response.text();
            allItems = parseCSV(text);
            categories = ['Tutti', ...new Set(allItems.map(i => i.categoria))];
            renderTabs();
            renderCards();
        } catch (e) {
            document.getElementById('content').innerHTML = `<p class="text-center py-20 text-ink/40">Errore nel caricamento. Verifica connessione.</p>`;
        }
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        const headers = splitCSVLine(lines[0]).map(h => h.trim());
        
        return lines.slice(1).map(line => {
            const values = splitCSVLine(line);
            const row = {};
            headers.forEach((h, i) => row[h] = values[i]?.replace(/^"|"$/g, '').trim());
            
            // LOGICA FIX PREZZO AGGRESSIVA
            let prezzoValue = 0;
            for (let key in row) {
                if (key.toLowerCase().includes("prezzo")) {
                    let raw = row[key].replace(/[€$\s]/g, '').replace(',', '.');
                    prezzoValue = parseFloat(raw) || 0;
                }
            }

            return {
                id: row.ID || Math.random().toString(),
                nome: row.Nome || "",
                categoria: row.Categoria || "Varie",
                ingredienti: row.Ingredienti || "",
                prezzo: prezzoValue,
                immagine: row['Immagine URL'] || "",
                isVeg: row.IsVeg?.toUpperCase().startsWith('S'),
                isSpicy: row.IsSpicy?.toUpperCase().startsWith('S'),
                varianti: row.Varianti || ""
            };
        }).filter(i => i.nome);
    }

    function splitCSVLine(line) {
        const result = [];
        let cur = "", inQuotes = false;
        for (let char of line) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur); cur = ""; }
            else cur += char;
        }
        result.push(cur);
        return result;
    }

    function renderTabs() {
        const bar = document.getElementById('tab-bar');
        bar.innerHTML = categories.map(cat => `
            <button onclick="setCategory('${cat}')" 
                class="shrink-0 flex items-center gap-2 px-5 py-2.5 rounded-2xl text-sm font-bold border border-ink/5 transition-all ${cat === activeCategory ? 'bg-brand text-white' : 'bg-white text-ink/50'}">
                <span>${CAT_EMOJI[cat] || '🍕'}</span> ${cat}
            </button>
        `).join('');
    }

    function setCategory(cat) {
        activeCategory = cat;
        renderTabs();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        renderCards();
    }

    function renderCards() {
        const container = document.getElementById('content');
        let filtered = allItems.filter(i => (activeCategory === 'Tutti' || i.categoria === activeCategory));
        if (searchTerm) filtered = filtered.filter(i => i.nome.toLowerCase().includes(searchTerm));
        if (filters.veg) filtered = filtered.filter(i => i.isVeg);
        if (filters.spicy) filtered = filtered.filter(i => i.isSpicy);

        document.getElementById('result-count').textContent = `${filtered.length} PRODOTTI`;
        
        container.innerHTML = filtered.map(item => `
            <div class="bg-white rounded-[28px] p-5 flex gap-4 shadow-sm border border-ink/5 active:scale-95 transition-all" onclick="openItemDetail('${item.id}')">
                <div class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 bg-cream-dark flex items-center justify-center text-3xl">
                    ${item.immagine ? `<img src="${item.immagine}" class="w-full h-full object-cover">` : (CAT_EMOJI[item.categoria] || '🍕')}
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-ink text-lg leading-tight">${item.nome}</h3>
                        <span class="font-black text-brand">€${item.prezzo.toFixed(2)}</span>
                    </div>
                    <p class="text-ink/40 text-xs line-clamp-2 mt-1">${item.ingredienti}</p>
                </div>
            </div>
        `).join('');
    }

    function openItemDetail(id) {
        const item = allItems.find(i => i.id === id);
        const modal = document.getElementById('modal-backdrop');
        const panel = document.getElementById('modal-panel');
        
        document.getElementById('modal-content').innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-4xl font-display font-bold">${item.nome}</h2>
                    <p class="text-ink/40 font-bold uppercase tracking-widest text-[10px] mt-1">${item.categoria}</p>
                </div>
                <span class="text-3xl font-black text-brand">€${item.prezzo.toFixed(2)}</span>
            </div>
            <p class="text-ink/60 text-base leading-relaxed mb-8">${item.ingredienti}</p>
            ${item.varianti ? `<div class="space-y-3 mb-8">
                <p class="text-[10px] font-black text-ink/30 uppercase tracking-widest">Personalizza</p>
                ${item.varianti.split(',').map(v => `
                    <label class="flex items-center justify-between p-5 bg-ink/[0.03] rounded-3xl border border-transparent active:border-brand/20">
                        <span class="text-sm font-bold">${v.trim()}</span>
                        <input type="checkbox" name="variant" value="${v.trim()}" class="w-6 h-6 text-brand rounded-full border-ink/10">
                    </label>`).join('')}
            </div>` : ''}
            <button onclick="addToCart('${item.id}')" class="w-full bg-brand text-white rounded-3xl py-5 font-bold text-lg shadow-xl shadow-brand/20 active:scale-95 transition-all">Aggiungi all'ordine</button>
        `;

        modal.classList.add('modal-active');
        setTimeout(() => panel.classList.add('modal-panel-active'), 10);
    }

    function addToCart(id) {
        const item = allItems.find(i => i.id === id);
        const variants = Array.from(document.querySelectorAll('input[name="variant"]:checked')).map(v => v.value);
        let extra = 0;
        variants.forEach(v => { const p = v.match(/\+([\d,.]+)/); if(p) extra += parseFloat(p[1].replace(',','.')); });

        cart.push({ cartId: Date.now(), ...item, prezzoTotale: item.prezzo + extra, selectedVariants: variants, qty: 1 });
        updateCartUI();
        closeModal();
    }

    function updateCartUI() {
        localStorage.setItem('filippone_cart', JSON.stringify(cart));
        const totalItems = cart.reduce((acc, i) => acc + i.qty, 0);
        document.getElementById('cart-badge').textContent = totalItems;
        document.getElementById('cart-badge').classList.toggle('hidden', totalItems === 0);
        document.getElementById('cart-qty-footer').textContent = `${totalItems} prodotti`;
    }

    function openCart() {
        const drawer = document.getElementById('cart-backdrop');
        const panel = document.getElementById('cart-panel');
        const container = document.getElementById('cart-items');
        
        if(cart.length === 0) {
            container.innerHTML = `<p class="text-center py-10 text-ink/30 font-bold">Il carrello è ancora vuoto.</p>`;
            document.getElementById('cart-summary').innerHTML = "";
        } else {
            container.innerHTML = cart.map(item => `
                <div class="bg-ink/[0.03] p-5 rounded-[24px]">
                    <div class="flex justify-between font-bold text-base">
                        <span>${item.nome}</span>
                        <span>€${(item.prezzoTotale * item.qty).toFixed(2)}</span>
                    </div>
                    <p class="text-[10px] text-ink/40 mt-1">${item.selectedVariants.join(' • ')}</p>
                    <div class="flex justify-between items-center mt-4">
                        <button onclick="removeFromCart(${item.cartId})" class="text-[10px] font-black text-brand uppercase tracking-widest">Rimuovi</button>
                        <div class="flex items-center gap-4 bg-white px-4 py-2 rounded-2xl font-black shadow-sm">
                            <button onclick="changeQty(${item.cartId}, -1)" class="text-brand">-</button>
                            <span class="text-sm">${item.qty}</span>
                            <button onclick="changeQty(${item.cartId}, 1)" class="text-brand">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((acc, i) => acc + (i.prezzoTotale * i.qty), 0);
            document.getElementById('cart-summary').innerHTML = `
                <div class="mt-8 pt-8 border-t border-ink/5 space-y-5">
                    <div class="flex justify-between items-center font-black">
                        <span class="text-ink/30 text-xs uppercase tracking-widest">Totale Stimato</span>
                        <span class="text-3xl text-brand">€${total.toFixed(2)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="printOrder()" class="bg-ink/5 text-ink py-4 rounded-3xl font-bold flex items-center justify-center gap-2">
                           🖨️ Stampa PDF
                        </button>
                        <button onclick="sendWhatsApp()" class="bg-[#25D366] text-white py-4 rounded-3xl font-bold flex items-center justify-center gap-2">
                           WhatsApp
                        </button>
                    </div>
                </div>`;
        }
        drawer.classList.add('modal-active');
        setTimeout(() => panel.classList.add('modal-panel-active'), 10);
    }

    function printOrder() {
        const total = cart.reduce((acc, i) => acc + (i.prezzoTotale * i.qty), 0);
        let content = cart.map(i => `<div>- <b>${i.nome}</b> x${i.qty} ${i.selectedVariants.length ? '('+i.selectedVariants.join(', ')+')' : ''} : €${(i.prezzoTotale*i.qty).toFixed(2)}</div>`).join('');
        
        document.getElementById('print-content').innerHTML = content;
        document.getElementById('print-total').innerHTML = `TOTALE: €${total.toFixed(2)}`;
        window.print();
    }

    function sendWhatsApp() {
        const total = cart.reduce((acc, i) => acc + (i.prezzoTotale * i.qty), 0);
        let msg = CONFIG.WA_PREAMBLE;
        cart.forEach(i => msg += `• *${i.nome}* x${i.qty} → €${(i.prezzoTotale * i.qty).toFixed(2)}\n`);
        msg += `\n*TOTALE:* €${total.toFixed(2)}`;
        window.open(`https://wa.me/${CONFIG.WA_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function changeQty(id, delta) {
        const item = cart.find(i => i.cartId === id);
        if(item) { item.qty += delta; if(item.qty < 1) return removeFromCart(id); updateCartUI(); openCart(); }
    }

    function removeFromCart(id) { cart = cart.filter(i => i.cartId !== id); updateCartUI(); openCart(); }
    function clearCart() { cart = []; updateCartUI(); closeCart(); }
    function closeModal() { document.getElementById('modal-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('modal-backdrop').classList.remove('modal-active'), 300); }
    function closeCart() { document.getElementById('cart-panel').classList.remove('modal-panel-active'); setTimeout(() => document.getElementById('cart-backdrop').classList.remove('modal-active'), 300); }
    function handleSearch() { searchTerm = document.getElementById('search-input').value.toLowerCase(); renderCards(); }
    function toggleFilter(f) { filters[f] = !filters[f]; document.getElementById(`chip-${f}`).classList.toggle('bg-brand', filters[f]); document.getElementById(`chip-${f}`).classList.toggle('text-white', filters[f]); renderCards(); }
    function loadCart() { const s = localStorage.getItem('filippone_cart'); if(s) { cart = JSON.parse(s); updateCartUI(); } }
    function renderSkeletons() { document.getElementById('content').innerHTML = Array(5).fill('<div class="skeleton h-28 rounded-[28px]"></div>').join(''); }
  </script>
</body>
</html>
