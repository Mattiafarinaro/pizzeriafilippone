<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pizzeria Filippone – Dal 1966 a Trento</title>

  <!-- ═══════════════════════════════════════════
       SEO & OpenGraph (WhatsApp / Social preview)
  ═══════════════════════════════════════════ -->
  <meta name="description" content="Menu digitale della Pizzeria Filippone, Trento. Dal 1966. Pizze classiche, speciali, antipasti, bevande e dolci." />
  <meta property="og:type"        content="restaurant.restaurant" />
  <meta property="og:title"       content="Pizzeria Filippone – Dal 1966 a Trento" />
  <meta property="og:description" content="Sfoglia il menu, filtra per vegetariano o piccante e ordina direttamente su WhatsApp!" />
  <meta property="og:image"       content="https://filipponepizzeria.github.io/og-image.jpg" />
  <meta property="og:url"         content="https://filipponepizzeria.github.io/" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v3 CDN (ottimale per GitHub Pages statico senza build pipeline) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            brand:  { DEFAULT: '#C1440E', light: '#E85D20', dark: '#8B2E07' },
            cream:  { DEFAULT: '#FAF6EF', dark: '#F0E8D8' },
            ink:    { DEFAULT: '#1A120B', muted: '#6B5744' },
          },
          animation: {
            'fade-in':    'fadeIn .35s ease forwards',
            'slide-up':   'slideUp .4s ease forwards',
            'shimmer':    'shimmer 1.4s infinite linear',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
          },
          keyframes: {
            fadeIn:  { from:{ opacity:0 }, to:{ opacity:1 } },
            slideUp: { from:{ opacity:0, transform:'translateY(12px)' }, to:{ opacity:1, transform:'translateY(0)' } },
            shimmer: { '0%':{ backgroundPosition:'-400px 0' }, '100%':{ backgroundPosition:'400px 0' } },
          },
        },
      },
    };
  </script>

  <style>
    /* ─── Base ─── */
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #FAF6EF;
      color: #1A120B;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C1440E55; border-radius: 2px; }

    /* ─── Tab bar ─── */
    #tab-bar { scrollbar-width: none; }
    #tab-bar::-webkit-scrollbar { display: none; }

    /* ─── Skeleton shimmer ─── */
    .skeleton {
      background: linear-gradient(90deg, #e8ddd0 25%, #f5ede0 50%, #e8ddd0 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    /* ─── Card hover ─── */
    .menu-card {
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .menu-card:active { transform: scale(.985); }

    /* ─── Badge pill ─── */
    .badge { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; letter-spacing:.03em; }

    /* ─── Modal backdrop blur ─── */
    #modal-backdrop { backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }

    /* ─── Sticky bottom safe-area ─── */
    #action-bar { padding-bottom: max(16px, env(safe-area-inset-bottom)); }

    /* ─── Filter chip active ─── */
    .chip.active { background: #C1440E; color: #fff; border-color: #C1440E; }

    /* ─── Hero texture ─── */
    #hero::after {
      content:'';
      position:absolute; inset:0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.03) 3px,
        rgba(0,0,0,.03) 6px
      );
      pointer-events:none;
    }

    /* staggered animation for cards */
    .menu-card { opacity:0; }
    .menu-card.visible { animation: slide-up .38s ease forwards; }
    @keyframes slide-up {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<body class="flex flex-col h-full">

  <!-- ═══════ HERO ═══════ -->
  <header id="hero" class="relative bg-brand text-cream overflow-hidden shrink-0" style="min-height:120px;">

  <!-- ═══════ TAB BAR (categorie) ═══════ -->

  <!-- ═══════ FILTER CHIPS ═══════ -->

  <!-- ═══════ MAIN SCROLL ═══════ -->

  <!-- ═══════ STICKY ACTION BAR ═══════ -->
  <div id="action-bar" class="fixed bottom-0 left-0 right-0 z-40 bg-cream/95 backdrop-blur border-t border-ink/10 px-4 pt-3">

      <a id="btn-call" href="tel:+390461924565"
         class="flex items-center justify-center gap-2 bg-ink text-cream rounded-2xl py-3.5 px-5 font-semibold text-sm transition active:scale-95 shrink-0">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.56-.56a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/></svg>

    <div id="cart-panel" class="bg-cream w-full max-w-lg rounded-t-3xl p-6 pb-10 transform translate-y-4 transition-transform duration-300 max-h-[85vh] overflow-y-auto">
      <div class="w-10 h-1 bg-ink/20 rounded-full mx-auto mb-5"></div>
      <div id="cart-content"></div>

  </div>

  <!-- ═══════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════ -->
  <script>
  // ──────────────────────────────────────────────
  // CONFIGURAZIONE – modifica questi valori
  // ──────────────────────────────────────────────
  const CONFIG = {
    // ① Pubblica il tuo Google Sheet come CSV:
    //    File → Pubblica sul Web → Foglio1 → CSV
    //    e incolla l'URL qui sotto:
    CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIN046Cc83hlXxUZeggwBmrZCwsqNc1a7eaSumJZgBlNo-Hm-kAdWcB8p1O5r3v_xHdrG9Fp50pjjZ/pub?gid=616902249&single=true&output=csv',

    // ② Numero di telefono (formato internazionale, solo cifre)
    PHONE: '+390461924565',

    // ③ Numero WhatsApp (stesso formato)
    WA_NUMBER: '390461924565',

    // ④ Testo preimpostato WhatsApp
    WA_TEXT: 'Ciao Filippone! 🍕 Vorrei ordinare: \n\n',

    // ⑤ Varianti standard mostrate in ogni modal
    VARIANTI: [
      { label: 'Impasto Kamut / Khorasan', delta: '+1.20' },
      { label: 'Impasto Farro',            delta: '+1.20' },
      { label: 'Aggiunta mozzarella di bufala', delta: '+2.00' },
      { label: 'Aggiunta ingrediente',     delta: '+1.00–5.00' },
    ],
  };

  // ──────────────────────────────────────────────
  // GOOGLE SHEETS COLUMN MAPPING
  // Il tuo foglio deve avere ESATTAMENTE queste intestazioni
  // nella prima riga (case-sensitive):
  //
  //  ID | Nome | Categoria | Ingredienti | Allergeni
  //  Prezzo (€) | Disponibile | Immagine URL | IsVeg | IsSpicy
  //
  // IsVeg   → "SI" / "NO"
  // IsSpicy → "SI" / "NO"
  // Disponibile → "SI" / "NO"
  // ──────────────────────────────────────────────

  // ─── State ───
  let allItems       = [];
  let activeCategory = 'Tutti';
  let filters        = { veg: false, spicy: false };

  // ─── Category groups (tab display names) ───
  const CAT_GROUPS = {
    'Tutti': null,
    'Pizze': ['Pizza Classica','Pizza Bianca','Pizza Speciale','Pizza della Casa'],
    'Sfizi': ['Antipasto','Insalata','Focaccia'],
    'Bevande': ['Bibita','Birra','Vino','Aperitivo','Amaro/Liquore','Caffetteria'],
    'Dolci': ['Dolce'],
  };

  const CAT_EMOJI = {
    'Tutti':'🍽️','Pizze':'🍕','Sfizi':'🫒','Bevande':'🍺','Dolci':'🍮',
  };

  // Categorie per cui mostrare varianti impasto/aggiunte
  const CAT_WITH_VARIANTS = new Set([
    'Pizza Classica','Pizza Bianca','Pizza Speciale','Pizza della Casa','Focaccia',
  ]);

  // ─── Carrello ───
  let cart = []; // [{id, nome, categoria, prezzo, qty}]

  function addToCart(item) {
    const existing = cart.find(c => c.id === item.id);
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ id: item.id, nome: item.nome, categoria: item.categoria, prezzo: item.prezzo, qty: 1 });
    }
    updateCartBadge();
    showAddedFeedback();
  }

  function removeFromCart(id) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx === -1) return;
    if (cart[idx].qty > 1) cart[idx].qty--;
    else cart.splice(idx, 1);
    updateCartBadge();
    renderCartContent();
  }

  function updateCartBadge() {
    const total = cart.reduce((s, c) => s + c.qty, 0);
    const badge = document.getElementById('cart-badge');
    if (total > 0) {
      badge.textContent = total;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }

  function showAddedFeedback() {
    // Flash verde sul bottone carrello
    const btn = document.querySelector('[onclick="openCart()"]');
    btn.style.background = '#16a34a';
    setTimeout(() => btn.style.background = '', 600);
    // Close item modal
    document.getElementById('modal-backdrop').classList.add('hidden');
    document.getElementById('modal-backdrop').classList.remove('flex');
  }

  function openCart() {
    renderCartContent();
    const bd = document.getElementById('cart-backdrop');
    bd.classList.remove('hidden');
    bd.classList.add('flex');
    requestAnimationFrame(() => {
      document.getElementById('cart-panel').style.transform = 'translateY(0)';
    });
  }

  function closeCart(e) {
    if (e.target === document.getElementById('cart-backdrop')) {
      document.getElementById('cart-backdrop').classList.add('hidden');
      document.getElementById('cart-backdrop').classList.remove('flex');
      document.getElementById('cart-panel').style.transform = 'translateY(4px)';
    }
  }

  function renderCartContent() {
    const el = document.getElementById('cart-content');
    if (!cart.length) {
      el.innerHTML = `
        <div class="text-center py-12 text-ink/40">
          <p class="text-5xl mb-3">🛒</p>
          <p class="font-semibold text-ink/60">Il carrello è vuoto</p>
          <p class="text-sm mt-1">Aggiungi qualcosa dal menu!</p>
        </div>`;
      return;
    }

    const total = cart.reduce((s, c) => s + c.prezzo * c.qty, 0);
    const itemsText = cart.map(c =>
      c.qty > 1 ? `• ${c.nome} x${c.qty}` : `• ${c.nome}`
    ).join('\n');
    const waText = encodeURIComponent(
      CONFIG.WA_TEXT + itemsText + `\n\nTotale stimato: €${total.toFixed(2)}`
    );

    el.innerHTML = `
      <h2 class="font-display text-2xl font-bold text-ink mb-4">Il mio ordine</h2>
      <div class="space-y-2 mb-4">
        ${cart.map(c => `
          <div class="flex items-center justify-between bg-white rounded-xl px-4 py-3 shadow-sm">
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-sm text-ink truncate">${c.nome}</p>
              <p class="text-xs text-ink/50">€${c.prezzo.toFixed(2)} cad.</p>
            </div>
            <div class="flex items-center gap-2 ml-3 shrink-0">
              <button onclick="removeFromCart('${c.id}')" class="w-7 h-7 rounded-full bg-cream-dark flex items-center justify-center text-ink font-bold text-lg leading-none active:scale-90 transition">−</button>
              <span class="w-5 text-center font-bold text-sm">${c.qty}</span>
              <button onclick="addToCartById('${c.id}')" class="w-7 h-7 rounded-full bg-brand text-cream flex items-center justify-center font-bold text-lg leading-none active:scale-90 transition">+</button>
            </div>
            <span class="ml-3 font-bold text-brand text-sm shrink-0">€${(c.prezzo * c.qty).toFixed(2)}</span>
          </div>
        `).join('')}
      </div>

      <div class="flex justify-between items-center px-1 mb-5">
        <span class="text-ink/50 text-sm">Totale stimato</span>
        <span class="font-display font-bold text-xl text-brand">€${total.toFixed(2)}</span>
      </div>

      <a href="https://wa.me/${CONFIG.WA_NUMBER}?text=${waText}"
         class="flex items-center justify-center gap-2 w-full bg-[#25D366] text-white py-4 rounded-2xl font-semibold text-base active:scale-95 transition mb-3">
        <svg width="20" height="20" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.474 2.027 7.78L0 32l8.47-2.22A15.93 15.93 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm8.087 22.357c-.34.955-1.987 1.827-2.717 1.942-.694.108-1.57.154-2.532-.159a23.05 23.05 0 01-2.292-.847C12.7 21.677 10.03 18.9 9.61 18.362c-.42-.538-1.54-2.046-1.54-3.905 0-1.86.977-2.775 1.32-3.155.343-.38.75-.476.999-.476l.714.014c.229.01.537-.087.84.64.318.756 1.08 2.616 1.174 2.806.095.19.158.413.031.666-.127.253-.19.413-.381.635-.19.222-.4.497-.571.666-.19.19-.388.396-.167.776.222.38.985 1.624 2.115 2.63 1.452 1.292 2.676 1.692 3.057 1.882.38.19.603.159.825-.095.222-.254.952-1.11 1.206-1.49.254-.38.508-.317.856-.19.349.127 2.21 1.042 2.59 1.232.38.19.634.285.728.444.096.16.096.928-.244 1.883z"/></svg>
        Invia ordine su WhatsApp
      </a>
      <button onclick="cart=[];updateCartBadge();renderCartContent()"
        class="w-full text-center text-sm text-ink/40 py-2 active:text-red-500 transition">
        🗑️ Svuota carrello
      </button>`;
  }

  function addToCartById(id) {
    const item = allItems.find(i => i.id === id);
    if (item) addToCart(item);
    renderCartContent();
  }

  // ─── Init ───
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('btn-call').href = `tel:${CONFIG.PHONE}`;
    document.getElementById('btn-wa').href =
      `https://wa.me/${CONFIG.WA_NUMBER}?text=${encodeURIComponent(CONFIG.WA_TEXT)}`;

    renderTabs();
    renderSkeletons();
    loadData();
  });

  // ─── CSV fetch & parse ───
  async function loadData() {
    if (CONFIG.CSV_URL === 'PLACEHOLDER_GOOGLE_SHEETS_CSV_URL') {
      allItems = DEMO_DATA;
      renderCards();
      return;
    }

    const csvUrl = CONFIG.CSV_URL;

    // Proxy cascade: prova in ordine finché uno funziona
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(csvUrl)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(csvUrl)}`,
      `https://thingproxy.freeboard.io/fetch/${csvUrl}`,
      csvUrl, // tentativo diretto (funziona se non c'è CORS)
    ];

    let lastError = '';
    const labels = ['corsproxy.io', 'allorigins.win', 'thingproxy', 'diretto'];
    for (let i = 0; i < proxies.length; i++) {
      const url = proxies[i];
      const statusEl = document.getElementById('load-status');
      if (statusEl) statusEl.textContent = `Tentativo ${i+1}/4 via ${labels[i]}...`;
      try {
        const r = await fetch(url, { cache: 'no-store' });
        if (!r.ok) { lastError = `HTTP ${r.status}`; continue; }
        const text = await r.text();
        if (!text || text.trim().length < 10) { lastError = 'Risposta vuota'; continue; }
        const parsed = parseCSV(text);
        if (!parsed.length) { lastError = 'CSV vuoto o intestazioni errate'; continue; }
        allItems = parsed;
        renderCards();
        return; // successo, esci
      } catch(e) {
        lastError = `[${labels[i]}] ${e.message}`;
        continue;
      }
    }

    // Tutti i proxy hanno fallito
    document.getElementById('content').innerHTML =
      `<div class="text-center py-16" style="color:#6B5744;padding:2rem">
        <p style="font-size:2.5rem;margin-bottom:.75rem">😕</p>
        <p style="font-weight:700;font-size:1.1rem">Impossibile caricare il menu.</p>
        <p style="font-size:.85rem;margin-top:.5rem;opacity:.7;line-height:1.6">
          Assicurati che il foglio sia pubblicato pubblicamente.<br>
          <b>File → Pubblica sul web → Foglio1 → CSV</b>
        </p>
        <p style="font-size:.7rem;margin-top:1rem;opacity:.4;font-family:monospace">${lastError}</p>
      </div>`;
  }

  function parseCSV(text) {
    // Normalize line endings (Google Sheets exports \r\n)
    const lines = text.trim().replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
    const headers = splitCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g,''));

    return lines.slice(1).map((line, idx) => {
      if (!line.trim()) return null;
      const vals = splitCSVLine(line);
      const obj = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g,'').trim(); });

      // Strip € symbol and handle Italian decimal comma
      const rawPrice = (obj['Prezzo (€)'] || obj['Prezzo'] || '0')
        .replace(/[€$£\s]/g, '')
        .replace(',', '.');

      const isVegVal   = (obj['IsVeg']   || obj['Is Veg']   || '').toUpperCase();
      const isSpicyVal = (obj['IsSpicy'] || obj['Is Spicy'] || '').toUpperCase();
      const trueVals   = ['SI', 'S\u00cc', 'YES', '1', 'TRUE'];

      return {
        id:          obj['ID']           || String(idx + 1),
        nome:        obj['Nome']         || '',
        categoria:   obj['Categoria']    || '',
        ingredienti: obj['Ingredienti']  || '',
        allergeni:   obj['Allergeni']    || '',
        prezzo:      parseFloat(rawPrice) || 0,
        disponibile: (obj['Disponibile'] || 'SI').toUpperCase() !== 'NO',
        immagine:    obj['Immagine URL'] || '',
        isVeg:       trueVals.includes(isVegVal),
        isSpicy:     trueVals.includes(isSpicyVal),
      };
    }).filter(i => i && i.nome);
  }

  function splitCSVLine(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
      else { cur += line[i]; }
    }
    result.push(cur);
    return result;
  }

  // ─── Tabs ───
  function renderTabs() {
    const bar = document.getElementById('tab-bar');
    bar.innerHTML = Object.keys(CAT_GROUPS).map(cat => `
      <button onclick="setCategory('${cat}')"
        id="tab-${cat}"
        class="shrink-0 flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all
               ${cat === activeCategory
                 ? 'bg-brand text-cream shadow-md'
                 : 'bg-cream text-ink/60 border border-ink/15'}">
        <span>${CAT_EMOJI[cat]}</span> ${cat}
      </button>
    `).join('');
  }

  function setCategory(cat) {
    activeCategory = cat;
    renderTabs();
    renderCards();
  }

  // ─── Filters ───
  function toggleFilter(f) {
    filters[f] = !filters[f];
    document.getElementById(`chip-${f}`).classList.toggle('active', filters[f]);
    renderCards();
  }

  // ─── Skeleton ───
  function renderSkeletons() {
    const c = document.getElementById('content');
    c.innerHTML = `<p id="load-status" style="text-align:center;font-size:.7rem;color:#aaa;padding:.5rem 1rem;font-family:monospace">Caricamento menu in corso...</p>` +
    Array(6).fill(0).map(() => `
      <div class="bg-white rounded-2xl p-4 flex gap-3 shadow-sm">
        <div class="skeleton w-20 h-20 rounded-xl shrink-0"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="skeleton h-4 w-3/4"></div>
          <div class="skeleton h-3 w-full"></div>
          <div class="skeleton h-3 w-2/3"></div>
          <div class="skeleton h-4 w-1/4 mt-2"></div>
        </div>
      </div>
    `).join('');
  }

  // ─── Cards ───
  function renderCards() {
    const cats = CAT_GROUPS[activeCategory];
    let items = cats
      ? allItems.filter(i => cats.includes(i.categoria))
      : allItems;

    if (filters.veg)   items = items.filter(i => i.isVeg);
    if (filters.spicy) items = items.filter(i => i.isSpicy);
    items = items.filter(i => i.disponibile);

    const count = document.getElementById('result-count');
    count.textContent = items.length ? `${items.length} voci` : '';

    if (!items.length) {
      document.getElementById('content').innerHTML = `
        <div class="text-center py-20 text-ink/40">
          <p class="text-5xl mb-4">🔍</p>
          <p class="font-semibold text-ink/60">Nessun risultato</p>
          <p class="text-sm mt-1">Prova a cambiare filtro o categoria</p>
        </div>`;
      return;
    }

    // Group by subcategory
    const grouped = {};
    items.forEach(item => {
      if (!grouped[item.categoria]) grouped[item.categoria] = [];
      grouped[item.categoria].push(item);
    });

    let html = '';
    Object.entries(grouped).forEach(([cat, list]) => {
      if (Object.keys(CAT_GROUPS).length > 1 && activeCategory === 'Tutti') {
        html += `<h2 class="text-xs font-semibold tracking-widest uppercase text-ink/40 mt-4 mb-1 px-1">${cat}</h2>`;
      }
      html += list.map((item, idx) => cardHTML(item, idx)).join('');
    });

    document.getElementById('content').innerHTML = html;

    // Stagger animation
    requestAnimationFrame(() => {
      document.querySelectorAll('.menu-card').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 40);
      });
    });
  }

  function cardHTML(item, idx) {
    const hasImg = item.immagine && item.immagine !== '';
    const badges = [
      item.isVeg   ? '<span class="badge bg-green-100 text-green-700">🌿 Veg</span>' : '',
      item.isSpicy ? '<span class="badge bg-orange-100 text-orange-700">🌶️ Piccante</span>' : '',
    ].filter(Boolean).join('');

    const priceStr = item.prezzo ? `€${item.prezzo.toFixed(2)}` : '–';

    return `
    <div class="menu-card bg-white rounded-2xl shadow-sm border border-ink/5 overflow-hidden cursor-pointer"
         onclick="openModal(${JSON.stringify(item).replace(/"/g,'&quot;')})">
      <div class="flex gap-3 p-4">
        ${hasImg
          ? `<img src="${item.immagine}" alt="${item.nome}"
               class="w-20 h-20 object-cover rounded-xl shrink-0 bg-cream"
               loading="lazy" onerror="this.style.display='none'" />`
          : `<div class="w-20 h-20 rounded-xl shrink-0 bg-cream-dark flex items-center justify-center text-3xl select-none">
               ${catEmoji(item.categoria)}
             </div>`
        }
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-display font-bold text-base leading-snug text-ink">${item.nome}</h3>
            <span class="text-brand font-bold text-base shrink-0">${priceStr}</span>
          </div>
          ${item.ingredienti
            ? `<p class="text-ink/55 text-xs mt-1 line-clamp-2 leading-relaxed">${item.ingredienti}</p>`
            : ''}
          ${badges ? `<div class="flex gap-1.5 mt-2">${badges}</div>` : ''}
        </div>
      </div>
    </div>`;
  }

  function catEmoji(cat) {
    const map = {
      'Pizza Classica':'🍕','Pizza Bianca':'🤍','Pizza Speciale':'⭐',
      'Pizza della Casa':'🏠','Antipasto':'🫒','Insalata':'🥗',
      'Focaccia':'🥖','Bibita':'🥤','Birra':'🍺','Vino':'🍷',
      'Aperitivo':'🍹','Amaro/Liquore':'🥃','Caffetteria':'☕','Dolce':'🍮',
    };
    return map[cat] || '🍽️';
  }

  // ─── Modal ───
  function openModal(item) {
    const priceStr = item.prezzo ? `€${item.prezzo.toFixed(2)}` : '–';
    const showVariants = CAT_WITH_VARIANTS.has(item.categoria);
    const allergens = item.allergeni
      ? item.allergeni.split(',').map(a => `<span class="badge bg-yellow-100 text-yellow-800">${a.trim()}</span>`).join('')
      : '';

    const variantiHTML = showVariants ? `
      <div>
        <p class="text-xs font-semibold text-ink/40 uppercase tracking-wider mb-1">Varianti &amp; aggiunte</p>
        <div class="bg-cream rounded-xl px-3">
          ${CONFIG.VARIANTI.map(v => `
            <div class="flex justify-between items-center py-2.5 border-b border-ink/5 last:border-0">
              <span class="text-sm text-ink">${v.label}</span>
              <span class="text-sm font-semibold text-brand">${v.delta}</span>
            </div>`).join('')}
        </div>
        <p class="text-xs text-ink/30 mt-1.5 px-1">Variazioni da €1,00 a €5,00</p>
      </div>` : '';

    document.getElementById('modal-content').innerHTML = `
      <div class="space-y-4">
        ${item.immagine
          ? `<img src="${item.immagine}" alt="${item.nome}" class="w-full h-44 object-cover rounded-2xl bg-cream" />`
          : `<div class="w-full h-28 rounded-2xl bg-cream-dark flex items-center justify-center text-6xl">${catEmoji(item.categoria)}</div>`
        }

        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-xs text-ink/40 uppercase tracking-widest font-semibold">${item.categoria}</p>
            <h2 class="font-display text-2xl font-bold text-ink mt-0.5">${item.nome}</h2>
          </div>
          <span class="text-brand text-2xl font-bold shrink-0">${priceStr}</span>
        </div>

        ${item.ingredienti ? `
          <div>
            <p class="text-xs font-semibold text-ink/40 uppercase tracking-wider mb-1">Ingredienti</p>
            <p class="text-sm text-ink/70 leading-relaxed">${item.ingredienti}</p>
          </div>` : ''}

        ${allergens ? `
          <div>
            <p class="text-xs font-semibold text-ink/40 uppercase tracking-wider mb-2">Allergeni</p>
            <div class="flex flex-wrap gap-1.5">${allergens}</div>
          </div>` : ''}

        ${variantiHTML}

        <button onclick='addToCart(${JSON.stringify(item).replace(/'/g,"\'")})'
           class="flex items-center justify-center gap-2 w-full bg-brand text-cream py-4 rounded-2xl font-semibold text-base active:scale-95 transition">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
          </svg>
          Aggiungi all'ordine
        </button>
      </div>`;

    const backdrop = document.getElementById('modal-backdrop');
    backdrop.classList.remove('hidden');
    backdrop.classList.add('flex');
    requestAnimationFrame(() => {
      document.getElementById('modal-panel').style.transform = 'translateY(0)';
    });
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-backdrop') || e.target.closest('#modal-close')) {
      document.getElementById('modal-backdrop').classList.add('hidden');
      document.getElementById('modal-backdrop').classList.remove('flex');
      document.getElementById('modal-panel').style.transform = 'translateY(4px)';
    }
  }

  // ESC to close
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal({ target: document.getElementById('modal-backdrop') });
  });
